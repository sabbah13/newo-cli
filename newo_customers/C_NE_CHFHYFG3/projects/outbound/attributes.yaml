attributes:
  - idn: project_attributes_setting_init_attributes_metadata_enabled
    value: "False"
    title: Project - Init - Setting-Up Attributes Metadata - Enabled [C]
    description: >-
      Metadata for one-time initialization of Attributes Metadata.


      This attribute controls the initial setup of attribute metadata. Since
      this process requires

      significant resources, the attribute automatically switches to `False`
      after the first

      initialization.


      If you need to update the attribute metadata, you must manually set it to
      `True` and press the

      `Publish` button.
    group: 8. System
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
