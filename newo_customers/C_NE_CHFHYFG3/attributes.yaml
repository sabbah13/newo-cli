  - idn: project_attributes_restaurant_googlemaps_reservation_url
    value: " "
    title: 1-17. Link (URL) - Google Booking Reservation [A] [IMPORTANT]
    description: >-
      "Reserve with Google" direct link for restaurant's table reservation.


      This attribute contains the link for booking a restaurant through Google.


      The system uses this link to retrieve available time slots and process
      reservations through Google.

      **If this attribute is not filled in, booking will not work.**


      Based on this link, another attribute is automatically generated –

      `project_attributes_private_dynamic_restaurant_google_restaurant_id`. It
      stores the restaurant's

      unique identifier in Google, which is also required for booking. If this
      attribute

      (`project_attributes_restaurant_googlemaps_reservation_url`) is correctly
      filled in, the system will

      be able to retrieve the restaurant ID and process bookings properly.


      Example: `https://www.google.com/maps/reserve/v/dine/c/XXXXXXXXXXX`
    group: 1. Business
    is_hidden: false
