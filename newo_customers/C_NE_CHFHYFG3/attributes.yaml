  - idn: project_business_industry
    value: restaurant_industry
    title: 1-15. Industry (DON'T CHANGE) [A] [IMPORTANT]
    description: >-
      This field indicates the industry for which the agent will be created
      during initial setup.


      It determines the agent's instructions and built-in intelligence, with
      thousands of corner cases

      specific to your industry.


      If you don't see your industry in the available list, select the closest
      matching industry or

      specify `sales_industry`.


      **Important:** Once the agent is created, this value should not be
      changed. Updating the industry

      after creation may cause the agent to behave incorrectly or provide
      inaccurate responses. If you

      need to change the industry, please contact support.


      Only the following industries are currently supported:


      - `beauty_industry`

      - `catering_industry`

      - `cleaning_industry`

      - `dental_industry`

      - `home_service_industry`

      - `hospitality_industry`

      - `restaurant_industry`

      - `sales_industry`
