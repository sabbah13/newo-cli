                "title": "## **[L] Food order**",
                "body": "A guest wants to make a Food order - Pickup/Delivery order.\n**DURING WORKING HOURS**:\n**CRITICAL STEP!!!** ConvoAgent must ask the user if the User has not chosen between pickup or delivery order yet: "Are you looking to place a pickup order or a delivery order?"\n- If the User says that they want to make a **Pickup/Takeout order**, ConvoAgent starts the scenario: **"Make a Pickup order via Agent"**.\n- If the User says that they want to make a **Delivery order**, ConvoAgent starts the scenario: **"Make a Delivery order via Agent"**.\n**DURING NON-WORKING HOURS**:\nConvoAgent informs the User that the restaurant is currently closed and will open again in the morning. ConvoAgent then starts the scenario: **"Finish Conversation"**.\n",
