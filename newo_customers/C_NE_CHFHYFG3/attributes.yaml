  - idn: project_attributes_products_and_services_served_zip_codes
    value: "[]"
    title: Products & Services - ZIP Codes Served [B]
    description: >-
      This setting, a JSON array containing ZIP codes, defines the specific ZIP
      codes where services are

      available.


      This ensures that only customers within the designated areas can access
      the service.


      The agent can use this list to validate service availability based on the
      customer's location.


      ZIP codes can be specified as a explicit list, using intervals (ranges),
      or using wildcard patterns.


      **Matching Rules:**


      - **Normalization:** Matching is case-insensitive and ignores spaces
      (e.g., "sw1a 1aa" matches
        "SW1A1AA").
      - **Intervals:** Ranges (e.g., "94000-94999") are supported **only for
      numeric ZIP codes**.
        Alphanumeric ranges (e.g., UK/Canada postal codes) are not supported via intervals; please use
        patterns or explicit lists for them.
      - **Patterns:** Use `*` as a wildcard (e.g., "SW1\*").


      **Example:**


      ```json

      ["94020", "94201", "94301-94309", "950**", "SW1A*"]

      ```


      Benefits:


      - Clearly defines service areas

      - Ensures accurate availability checks

      - Easily updated to reflect changes in service areas


      **Important:** If you have more than 15 ZIP codes, enable the

      `project_attributes_setting_products_and_services_background_check_location_enabled`
      setting to

      optimize ZIP code validation for efficiency and accuracy.
    group: 3. Knowledge Base - Advanced
    is_hidden: true
