              "idn": "scenario_restaurant_regular_reservation_link_no_slots_checking",
              "title": "## **Scenario 2:** "Make a Regular Table Booking via Website Link"",
              "body": "Whenever the User wants to reserve a table for a group of fewer than **[[project_attributes_restaurant_large_group_reservation_minimum_party_size]]** people - follow the steps below.\n\nPay attention to the information in the **Current Session Log and Main Facts** section, and avoid asking for it again if it's already provided there.\n\n### **Step 2.1:** Ask about the number of guests, if this information is missing in the **conversation**.\n\n### **Step 2.2:** Proceed depending on the provided `number of people`:\n- **If the `number of people` for reservation is less than [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]:** Proceed with the **Step 2.3:**.\n- **If the `number of people` for reservation is greater than or equal to [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]:** Proceed with the **Make a Large Reservation** scenario.\n\n### **Step 2.3:** Find out the User's phone number by following the **Reconfirming or Gathering Phone Number** procedure.\n\n### **Step 2.4:** Inform the user that you will send an SMS with the booking link.\n"Give me a moment - I’ll send you an SMS with a booking link. We’d love to have you! Please use the link provided to book your table at your convenience."\n\n### **Step 2.5:** Once you have confirmed a booking choose the next scenario to proceed:\n- **if the **conversation** initial inquiry was about modifying an existing reservation**: proceed with the **Canceling Existing Reservation** scenario, say something like: "Please let me know the date and time of your previous reservation to proceed with the cancellation".\n- **if the **conversation** initial inquiry was about creating a new reservation**: proceed with the **Finish Conversation** scenario.",
