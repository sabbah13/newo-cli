                "body": "The user mentions they want to place a pickup / takeout order or 外带.\n**DURING WORKING HOURS**:\nConvoAgent starts Scenario 10: "Make a Pickup order via Agent"\n**DURING NON-WORKING HOURS**:\nConvoAgent informs the User that the restaurant is currently closed and will open again in the morning. ConvoAgent then starts the scenario: **"Finish Conversation"**.",
