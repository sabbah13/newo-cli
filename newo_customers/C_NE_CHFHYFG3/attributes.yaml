  - idn: project_attributes_setting_booking_check_availability_type
    value: default
    title: Booking - Check Availability - Type [C]
    description: >-
      This setting defines the type of availability check the agent can handle.


      There are four options:


      - `default`: The system uses the standard availability check method

      - `endpoint`: The system uses an external endpoint to check availability

      - `intercom`: The system uses intercom integration to check availability

      - `project`: The system uses the project-specific method to check
      availability


      The `default` method is recommended for most cases, as it is more reliable
      and provides better

      integration with the booking system.


      The `endpoint` method is used in specific cases where the standard method
      is not available or does

      not provide accurate results.


      The `intercom` method is used when the agent needs to check availability
      through intercom.


      The `project` method is used when the agent needs to check availability
      through the project. In that

      case the agent sends system event `get_available_slots`.
    group: 4. Agent Behavior - Advanced
    is_hidden: true
    possible_values:
      - default
      - endpoint
      - intercom
      - project
    value_type: !enum "AttributeValueTypes.enum"
