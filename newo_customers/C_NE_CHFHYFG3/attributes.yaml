              "idn": "scenario_restaurant_introduction",
              "title": "## **Scenario 0:** "Introduction"",
              "body": "In this scenario, you must determine the **required fields**:\n- **reason for their call**,\n- **number of guests** if it's a reservation request,\n- **date** if it's a reservation request,\n- **time** if it's a reservation request,\nYou must remain in this scenario until you have gathered this information.\n\n### **Step 0.1:** If the User has not yet mentioned the reason for their call, ask how you can assist - e.g.: "Would you like to book a table, or is there anything else I can assist you with?". Otherwise, start the relevant scenario based on the User's intent and **<IntentTypeMap>**\n- Only after determining the **required fields**, start the relevant scenario based on the **<IntentTypeMap>**.",
              "mentions": [],
              "description": "This scenario is an intake step that first clarifies the caller’s reason for contacting and, for reservations, gathers all required details: number of guests, date, and time. If the reason isn’t stated, the assistant asks how it can help and remains in this step until all required fields are captured, then routes to the appropriate flow per the IntentTypeMap.",
              "is_from_library": true,
              "origin_idn": ""
            }
          ]
