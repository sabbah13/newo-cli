  - idn: >-
      project_attributes_private_feature_flag_booking_use_new_availability_formatted_response_processor
    value: "False"
    title: >-
      Feature Flag - Booking - Use New Availability Formatted Response Processor
      [C]
    description: >-
      If your system provides the slots in the format described in

      `project_attributes_setting_booking_check_availability_processing_type`
      for the `formatted_response`

      type, then please switch this attribute to `True`.
    group: 8. System
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
  - idn: >-
      project_attributes_private_feature_flag_booking_use_new_restaurant_availability_check_approach
    value: "True"
    title: >-
      Feature Flag - Booking - Use New Restaurant Availability Check Approach
      [C]
    description: >-
      This attribute enables the new approach to checking restaurant
      availability.


      The new approach is designed to improve the accuracy of reservation
      availability checks by

      integrating with the restaurant's booking system. It allows the system to
      provide more precise

      information about available time slots and booking options.


      When this attribute is enabled, the system will use the new availability
      check method. If disabled,

      the old approach will be used instead.


      **Note:** This attribute should be set by the system administrator or
      technical team. It is not

      recommended to change this setting without proper testing.
    group: 8. System
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
  - idn: >-
      project_attributes_private_feature_flag_booking_use_new_restaurant_create_booking_approach
    value: "True"
    title: Feature Flag - Booking - Use New Restaurant Create Booking Approach [C]
    description: >-
      This attribute enables the new approach to booking reservations at
      restaurants.


      The new approach is designed to improve the reservation process. It allows
      to get link to manage

      booking and send it to the user via SMS.


      When this attribute is enabled, the system will use the new booking
      method. If disabled, the old

      approach will be used instead.


      **Note:** This attribute should be set by the system administrator or
      technical team. It is not

      recommended to change this setting without proper testing.
    group: 8. System
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
  - idn: project_attributes_setting_hipaa_mode_enabled
    value: "False"
    title: HIPAA Mode [A]
    description: >-
      When the HIPAA Mode is set to `True`, the platform will delete session
      content, including both the

      text and audio parts.


      To comply with HIPAA, it is also mandatory to disable sending reports via
      SMS and email, as well as

      recording sessions in Google Sheets.
    group: 1. Business - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
  - idn: project_attributes_setting_magic_browser_alert_enabled
