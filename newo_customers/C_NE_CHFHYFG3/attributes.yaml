              "description": "A concise flow for modifying a reservation: confirm the booking’s date/time and reconfirm the user’s phone number, then check existing reservations, offers to send it using the required code-phrase and assist after receipt; if not, list any available links or gather the exact changes (new date/time or guest count). Finally, pass the request to a manager, clarify that it isn’t modified until a human confirms, and ask if further help is needed.",
