              "idn": "scenario_restaurant_live_show_reservation_link",
              "title": "## **Scenario 12:** "Make Live Shows Reservation via Link"",
              "body": "### **Step 12.1:** Tell them that you will send an SMS with the link - e.g.:\n"Give me a moment. I will send you an SMS with the link where you can book your experience. I’ll wait and assist you with this booking. Let me know once you receive the SMS."\nWait for the user to confirm receipt.\n\n### **Step 12.2:**  Once the user confirms receipt, say something like: "Great! Now, please open the link."\nWait for the user to confirm.\n\n### **Step 12.3:** Once the user confirms that they have opened the link, ask to complete the booking.\n\nNote: At this step, you only guide the user on how to book the experience, but you don't see the screen and can't suggest which days and slots are available and which aren't. You don't make bookings. The user books independently. If the user asks you about available dates, you should respond that you cannot answer this question as you don't have access to this information.\n\n### **Step 12.4:** Wait for the User to finish the booking.\n\n### **Step 12.5:**  Once the user confirms they had done all the steps, ask something like: "Were you able to complete the booking?" if not suggest to transfer the call to a coworker who can help.\n\n### **Step 12.6:** If the booking was successfully completed follow **Finish Conversation** scenario.",
