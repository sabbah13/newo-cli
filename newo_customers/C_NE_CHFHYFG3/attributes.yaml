                "type": "boolean",
                "description": "The agent promised to calculate the total price of the order exactly in their last message (enclosed in <LatestConvoAgentAnswer>). For example, 'Let me calculate your total, one moment please...' or 'Let me also calculate your total.'"
              }
            },
            "useConversationHistory": true
          },
          "submit_order_tool": {
            "description": "Submits the customer's food order to the restaurant POS system and sends a payment link via SMS",
            "conditions": {
              "agentSubmittingOrder": {
                "type": "boolean",
                "description": "The agent explicitly stated they are submitting or placing the order NOW in their last message (enclosed in <LatestConvoAgentAnswer>), using exact phrases like 'Let me submit your order now', 'I'm placing your order now', 'Submitting your order', or 'Let me process your order'. The agent must be actively doing it NOW, not offering to do it or asking if they should."
              },
              "orderComplete": {
                "type": "boolean",
                "description": "ALL of the following must be true in the conversation: (1) the customer has provided their name, (2) the customer has provided their phone number, and (3) at least one menu item has been ordered"
              }
            },
            "action": {
              "type": "send_webhook",
              "options": {
                "method": "POST",
                "url": "https://cartersunny.app.n8n.cloud/webhook/order",
                "body": {
                  "type": "object",
                  "properties": {
                    "source": {
                      "type": "string",
                      "enum": ["ai_voice_agent"],
                      "description": "Always set to 'ai_voice_agent'"
                    },
                    "customer": {
                      "type": "object",
                      "properties": {
                        "name": {
                          "type": "string",
                          "description": "Customer's full name from the conversation. REQUIRED - extract from conversation history."
                        },
                        "phone": {
                          "type": "string",
                          "description": "Customer's phone number in format +1XXXXXXXXXX. REQUIRED - extract from conversation history."
                        }
                      }
                    },
                    "order_type": {
                      "type": "string",
                      "enum": ["pickup", "delivery"],
                      "description": "Whether customer wants pickup or delivery. Default to 'pickup' if not explicitly specified."
                    },
                    "scheduled_time": {
                      "type": "string",
                      "description": "ISO 8601 datetime for when the order should be ready. Use empty string '' for ASAP orders."
                    },
                    "items": {
                      "type": "array",
                      "description": "Array of menu items ordered by the customer in English ONLY",
                      "items": {
                        "type": "object",
                        "properties": {
                          "name": {
                            "type": "string",
                            "description": "Exact name of the menu item matching the restaurant menu in English ONLY"
                          },
                          "quantity": {
                            "type": "integer",
                            "description": "Number of this item ordered. Default to 1 if not specified."
                          },
                          "modifiers": {
                            "type": "array",
                            "description": "Any modifications or special requests for this item in English ONLY. Use empty array [] if none.",
                            "items": {
                              "type": "object",
                              "properties": {
                                "name": {
                                  "type": "string",
                                  "description": "Name of the modifier (e.g., 'Size', 'Spice Level')"
                                },
                                "value": {
                                  "type": "string",
                                  "description": "Value of the modifier (e.g., 'Large', 'Spicy')"
                                }
                              }
                            }
                          }
                        }
                      }
                    },
                    "special_instructions": {
                      "type": "string",
                      "description": "Any special instructions for the entire order. Use empty string '' if none provided."
                    }
                  }
                },
                "headers": {
                  "type": "object",
                  "properties": {
                    "Content-Type": {
                      "type": "string",
                      "enum": ["application/json"]
                    }
                  }
                }
              }
            },
            "after_actions": [
              {
                "type": "send_urgent_message",
                "options": {
                  "prefix": "Order submitted successfully!",
                  "uninterruptible": true,
                  "call_analyze_conversation_skill": true
                }
              }
            ],
            "useConversationHistory": true
          }
        }
      }
    title: Conversation - Tools [C]
    description: >-
      This Attributes specifies the `Tools` that are available for the agent to
      use during the

      conversation. You can either override existing tools or add new ones.


      **Important:** This feature is under development, use with caution.
      Interface might be changed in

      future releases. Do not use if it's not necessary.


      Each tool has an `action` and `after_actions` (optionally)


      In addition, each tool may define a `conflictPolicy` to resolve collisions
      when multiple tools are

      selected for execution at the same time.


      **The following actions are supported:**


      # Actions


      ## 1) `send_event`


      Fire a named system event. **After actions:** _Not supported_ (this action
      cannot have

      `after_actions`).


      **Options**


      - `type`: `"send_event"` (not required, `type` defaults to it)


      > Use when you just need to notify the system and handle the event
      completely on your own.


      ---


      ## 2) `send_webhook`


      Make an HTTP request to an external endpoint. **After actions:**
      _Supported_ (you may chain one or

      more after actions below, in order).


      **Options**


      - `type`: `"send_webhook"` (required)

      - `options.method`: HTTP method. One of `"GET" | "POST" | "PUT" | "PATCH"
      | "DELETE"`. Default:
        `"GET"`.
      - `options.url`: Target URL. **Required.**

      - `options.query`: Fields to place in the URL query string. _(Object
      schema describing fields to
        fill.)_
      - `options.headers`: HTTP headers to send. _(Object schema describing
      fields to fill.)_

      - `options.body`: JSON body to send. _(Object schema describing fields to
      fill.)_


      > Tip: Provide only the fields you actually need in `query`, `headers`,
      and `body`.


      ---


      # After actions


      ## A) `send_urgent_message`


      ### Supported actions: [`send_webhook`]


      Immediately sends a high-priority message to the user.


      **Options**


      - `prefix` _(string, optional)_: Text placed on a line above the message
      content.

      - `uninterruptible` _(boolean, optional)_: If set, the message won’t be
      interrupted by other flows.
        Default behavior is enabled.
      - `call_analyze_conversation_skill` _(boolean, optional)_: Request
      follow-up analysis. Default:
        `false`.
      - `call_manage_task_skill` _(boolean, optional)_: Request task handling.
      Default: `false`.


      ---


      ## B) `set_persona_attribute`


      ### Supported actions: [`send_webhook`]


      Writes a value into the user’s persona/profile.


      **Options**


      - `attribute_name` _(string, required)_: The profile field to set.

      - `llm_process_instruction` _(string, optional)_: A short instruction
      telling the AI how to
        transform the latest input into the value to store (e.g., “If data is successfully collected,
        generate True, else False.”). If empty, input used as-is with no post-pro.

      ---


      ## C) `set_prompt_section`


      ### Supported actions: [`send_webhook`]


      Stores text into a named custom section of the user’s prompt (for future
      turns).


      **Options**


      - `section_name` _(string, required)_: The prompt section to write to.
      Example: "section_name":
        "FullNameValidationProcess".
      - `llm_process_instruction` _(string, optional)_: A short instruction
      telling the AI how to
        transform the latest input into the section value (e.g., “If validated, output the full name;
        otherwise output ‘False’.”). If empty, input used as-is with no post-pro.

      ---


      # Conflict resolution


      ## `conflictPolicy`


      `conflictPolicy` is an optional object on the tool definition level. It
      can be omitted or empty (no

      effect), or it can contain a single tag key:


      - `conflictPolicy.tag` _(string, required)_: A grouping key used to
      prevent multiple tools from the
        same group from executing in the same selection.

      If more than one tool with the same `conflictPolicy.tag` is selected for
      execution, they will be

      reranked by the LLM and **only ONE tool for that tag will be executed**.
      This is guaranteed.


      ---


      # Notes


      - **Conditions**: You decide when a tool triggers by defining booleans
      like `emailProvided`,
        `phoneNumberProvided`, etc.
      - **useConversationHistory**: `true/false`—whether the tool can use prior
      conversation context to
        auto-fill fields. When `false`, only last agent's message considered.
      - **Order of after actions** matters: they run top to bottom.

      - **Conflict resolution**: Use `conflictPolicy.tag` to ensure only one
      tool from a mutually
        exclusive group (e.g., multiple SMS-related tools) can execute at a time.

      Example of overriding existing tool - `calculation_tool` and adding new
      `report_phone_number_tool`:


      ```json

      {
        "tools": {
          "report_phone_number_tool": {
            "conditions": {
              "phoneNumberProvided": {
                "type": "boolean",
                "description": "The user just provided their phone number"
              }
            },
            "action": {
              "type": "send_webhook",
              "options": {
                "method": "GET",
                "query": {
                  "type": "object",
                  "properties": {
                    "phone_number": {
                      "type": "string",
                      "description": "User's provided phone number"
                    }
                  }
                },
                "headers": {
                  "type": "object",
                  "properties": {
                    "Content-Type": {
                      "type": "string",
                      "enum": ["application/json"]
                    }
                  }
                },
                "url": "https://hook.us1.make.com/somewebhookup"
              }
            },
            "after_actions": [
              {
                "type": "send_urgent_message"
              }
            ],
            "useConversationHistory": true
          },
          "calculation_tool": {
            "description": "The agent calculates the price and informs the user about it.",
            "conditions": {
              "agentPromised": {
                "type": "boolean",
                "description": "The agent promised to calculate the approximate estimate price right now exactly in their last message (enclosed in <LatestConvoAgentAnswer>)."
              }
            },
            "useConversationHistory": false
          }
        }
      }

      ```


      Example of adding new tool - `custom_tool`:


      ```json

      {
        "tools": {
          "custom_tool": {
            "conditions": {
              "userAskedForCustomTool": {
                "type": "boolean",
                "description": "The agent promised to use a custom tool in their last message (enclosed in <LatestConvoAgentAnswer>) and use previously provided data in the conversation (enclosed in <Conversation>)."
              }
            },
            "useConversationHistory": true
          }
        }
      }

      ```


      Example of using `conflictPolicy` to avoid executing multiple tools from
      the same group:


      ```json

      {
        "tools": {
          "send_sms_tool": {
            "description": "This tool sends an SMS to the User",
            "conflictPolicy": {
              "tag": "sms"
            },
            "conditions": {
              "agentPromised": {
                "type": "boolean",
                "description": "The agent clearly states that they are going to send an SMS. So their <LatestConvoAgentAnswer> should contain the explicit keywords "SMS" or "text message", e.g.: "I will send you an SMS / text message shortly...", "Give me a moment, I will send you an SMS / text message...", "I will send an SMS / text message with the appointment request details.", "I'm sending a text message / SMS...", "Let me try sending it (considering SMS or text message) again...", "I will resend an SMS / text message...", etc."
              }
            },
            "useConversationHistory": false
          },
          "send_manage_booking_url_tool": {
            "description": "This tool sends an SMS URL to the user with the link to manage their previously made booking.",
            "conflictPolicy": {
              "tag": "sms"
            },
            "conditions": {
              "agentPromised": {
                "type": "boolean",
                "description": "The agent clearly states that they are going to send a link for the user to manage their booking."
              },
              "bookingExist": {
                "type": "boolean",
                "description": "During the conversation the agent actually checked existing user's bookings and found the exact one, so the exact booking to send url for is known"
              }
            },
            "useConversationHistory": true
          }
        }
      }

      ```


      In the example above, both tools share the same `conflictPolicy.tag`
      (`"sms"`). If both tools are

      selected for execution, they will be reranked and **only one** of them
      will be executed.
    group: 4. Agent Behavior - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.json"
  - idn: project_attributes_setting_waiting_mode_fallback_instruction
    value: >-
