    title: 5-05. Reports - Session Ended Report - Content [B] [IMPORTANT]
    description: >-
      Specify the content of the report that will be generated upon session
      completion.


      Agents can send reports to business management upon the completion of
      sessions (for instance, after

      phone calls or live chat sessions).


      In this attribute, you can define which types of sessions should trigger
      reports (you probably don't

      want reports for spam calls) and what specific information should be
      included in the report

      depending on the session type. For example, for a large group booking, you
      might want to see the

      date and number of guests, while for a delivery order, you'd likely prefer
      the delivery address and

      product details.


      Agents can send reports via both email and SMS.


      A convenient feature is that you can customize report content depending on
      the channel. For

      instance, you can configure the agent to send reports for urgent orders
      via both SMS and email,

      while standard order reports can be sent by email only.


      **Note 1:** The specific email address and phone number for report
      delivery can be configured in the

      field `project_attributes_setting_session_ended_report_criteria_template`.


      **Note 2:** If you do not want the agent to send reports after sessions at
      all, set

      `project_attributes_setting_session_ended_report_enabled` to `False`.


      **Note 3:** Agents can create entries in a specialized Google Sheet named
      `Client Session Logs`, the

      link to which is stored in the attribute
      `project_attributes_info_client_session_logs_table_link`.


      **Note 4:** Agents can also create entries in your CRM or booking system.
      For assistance with

      configuring this feature, please contact support.


      Example:


      ```txt

      ## Report Type: **LARGE GROUP RESERVATION**


      ### Description:

      The customer wants to book a large group party.


      ### Fields to be included in the report:

      User name

      User phone

      User email

      Party size

      Requested date

      Requested time

      Special requests

      40-word summary


      ### Subject line format:

      Congratulations with a LARGE GROUP RESERVATION! [user name] [user phone]
      [12-word

      additional summary]


      ### SMS example:

      Congratulations! LARGE GROUP RESERVATION: [user name] [user phone]
      [20-word additional summary]

      Truly, [agent name], [agent title]

      ```


      **Important:** Attributes
      `project_attributes_setting_session_ended_report_content` and

      `project_attributes_setting_session_ended_report_criteria_template` are
      highly related to each

      other. Update them accordingly.
    group: 5. Reports
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_setting_session_ended_report_criteria_template
    value: |-
      **Criteria for SMS Report:**
      - **During working hours:**
        - If it is a Make a Regular Table Booking, Food Order, Large Reservation, Catering Order, Private Dining, Reschedule or Modification, Cancellation, Guest Support, Contractor Support, Manager or Human Request send an SMS to [[project_business_working_hour_escalation_phone]]
      ---
      **Criteria for Email Report:**
      - **Both during working hours and non-working hours:**
        - If it is a Make a Regular Table Booking, Food Order, Large Reservation, Catering Order, Private Dining, Reschedule or Modification, Cancellation, Guest Support, Contractor Support, Manager or Human Request send an email to [[project_business_manager_email]]
    title: 5-06. Reports - Session Ended Report - Criteria [B] [IMPORTANT]
    description: >-
      Set a template of criteria to be used for generating a report upon session
      completion.


      This attribute defines the "template" for the report generated after the
      conversation ends. The word

      "template" indicates that within the text of this attribute, values from
      other attributes can be

      inserted. Special "placeholders" in the format [[attribute_name]] are used
      for this purpose. When

      the conversation ends, the system automatically replaces these
      placeholders with real data and

      generates the final report. As a result, this attribute allows you to
      receive a completed report

      text with all the necessary data in the appropriate places. You must
      include names from Intent Types

      column from Workflow Builder. Otherwise, your reports won't be sent.


      Example:


      ```txt

      **Criteria for SMS Report:**

      - **During working hours:**
        - If it is a Manager or Human Request send an SMS to +12223334444
        - If it is a Large Reservation or Cancel Reservation, send an SMS to the
          [[project_business_working_hour_escalation_phone]]
        - If it is a Guest Support or Contractor support send an SMS to [[project_business_working_hour_escalation_phone]]
      - **Outside working hours:**
        - If it is a Human or Manager Request, send an SMS to +12223334444
      ---

      **Criteria for Email Report:**

      - If it is a Manager or Human Request, send an email to
      emergency@email.example

      - If it is a Large Reservation, Cancel Reservation, Reschedule or
      modification, send an email to
        [[project_business_manager_email]]
      - If it is a Guest Support or Contractor Support send an email to
      [[project_business_manager_email]]

      ```


      You can also include any amount of additional receiver email addresses in
      the form of `cc`. Use the

      following example:


      ```txt

      ...

      **Criteria for Email Report:**

      - If it is a Manager or Human Request, send an email to
      [[project_business_manager_email]] and cc to
      [[project_business_top_owner_email]],
      [[your_custom_attribute_name_with_email_address]]

      - If it is a Large Reservation, Cancel Reservation, Reschedule or
      modification, send an email to
        [[project_business_manager_email]] and cc to your-first-additional-email@example.com, your-second-additional-email@example.com
      - If it is a Guest Support or Contractor Support, send an email to
      [[project_business_manager_email]] and cc to
      your-third-additional-email@example.com

      ...


      ```


      You can also include any amount of additional receiver phone numbers in
      the form of `sms`. Use the

      following example:


      ```txt

      ...

      **Criteria for SMS Report:**

      - If it is a Manager or Human Request, send an SMS to
      [[project_business_working_hour_escalation_phone]] and +12223334445

      - If it is a Large Reservation, Cancel Reservation, Reschedule or
      modification, send an SMS to +12223334444 and +12223334446

      ...


      ```


      **Important:**


      - To add, remove fields or modify email subject / sms body templates, use
      Reports - Session Ended
        Report (`project_attributes_setting_session_ended_report_content`)
      - Double square brackets are used to inject attribute value. Use `[[..]]`
      format to specify the
        attribute name. For example, `[[project_business_manager_email]]` will be replaced with the value
        of the `project_business_manager_email` attribute. So if you want to specify some email or phone
        number which is not an attribute, specify it as is, without square brackets (see the example with
        `+12223334444` and `emergency@email.example` mentioned above).
    group: 5. Reports
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
