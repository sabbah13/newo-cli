                "description": "Use this flow when relaying a message to the manager: first ask what the user wants to convey; if sufficient context exists, assist and close, otherwise confirm their name and phone number. Let them know you’ll pass the message to the manager who will get back to them as soon as possible—clarifying that any reschedule, modification, or cancellation isn’t final until a human confirms—then offer further help and finish the conversation.",
