    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_setting_outbound_naive_conversation_deadline_seconds
    value: "180"
    title: Outbound - Conversation Start Deadline (Queue Timeout) [C]
    description: >-
      This attribute defines the **maximum time, in seconds,** the system will
      wait for the

      `conversation_started` event after an outbound call is placed.


      - **Deadline-Based Waiting:** A timer starts when the call is queued or
      initiated. The system waits
        for `conversation_started` within this window.
      - **Failure Handling:** If the event does not arrive before the deadline,
      the call is treated as
        **failed**.
      - **Queue Cleanup:** Failed calls are removed from the queue so they do
      not occupy capacity or retry
        slots.
    group: 4.1. Outbound
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.number"
  - idn: project_attributes_setting_outbound_default_retry_timeout
    value: "10"
    title: Outbound - Default Retry Timeout [A]
    description: |-
      The default retry timeout in minutes for outbound calls.

      This value is used when no specific retry timeout is set for a call.
    group: 4.1. Outbound
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.number"
  - idn: project_attributes_setting_outbound_greeting_delay
    value: "0"
    title: Outbound - Greeting Delay [A]
    description: >-
      The delay in seconds before the outbound greeting is played to the
      customer.


      This setting is used to control the timing of the greeting message during
      outbound calls.
    group: 4.1. Outbound
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.number"
  - idn: project_attributes_setting_outbound_max_active_calls
    value: "50"
    title: Outbound - Max Active Calls [C]
    description: >-
      This attribute defines the **upper limit of active call sessions**
      permitted to run simultaneously.

      It serves as a critical governance mechanism for two primary purposes:


      - **Platform Load Orchestration:** Prevents system resource exhaustion by
      capping the total
        processing demand at any given moment.
      - **Integration Compliance:** Ensures outgoing and incoming traffic
      remains within the specific
        capacity limits defined by **NEWO Voice integrations**.

      **Overflow Handling:**


      When the defined limit is reached, any additional incoming call requests
      are not rejected. Instead,

      they are placed into a **priority queue**. These queued calls are
      automatically executed in sequence

      as soon as existing sessions conclude and capacity becomes available
      (i.e., when "queue pressure"

      subsides).
    group: 4.1. Outbound
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.number"
  - idn: project_attributes_setting_outbound_default_retry_number
    value: "3"
    title: Outbound - Number Of Attempts [A]
    description: >-
      Number of attempts to retry the outbound call.


      Retry is performed in such cases: user did not answer the call, user
      rejected the call, voicemail

      was detected.
