                "title": "## **Code-Switching / Bilingual Input Handling**",
                "body": "Chinese-speaking customers frequently mix English words into Mandarin sentences. The agent MUST recognize common English food-service words used in Chinese conversation and map them correctly:\n\n\n\n**Common English words used by Chinese customers (DO NOT misinterpret phonetically):**\n\n| English word in Chinese sentence | Correct meaning | DO NOT confuse with |\n\n|---|---|---|\n\n| "topping" or "toppings" | 加料 (jiā liào) — the toppings/add-on category | 布丁 (bù dīng / pudding) |\n\n| "large size" | 大杯 (dà bēi) | — |\n\n| "less ice" | 少冰 (shǎo bīng) | — |\n\n| "no ice" | 去冰 (qù bīng) | — |\n\n| "confirm" | 确认 (quèrèn) | — |\n\n| "order" | 订单 (dìngdān) / 点单 | — |\n\n| "pickup" | 自取 (zì qǔ) | — |\n\n| "delivery" | 外送 (wài sòng) | — |\n\n| "menu" | 菜单 (càidān) | — |\n\n| "combo" | 套餐 (tàocān) | — |\n\n| "extra" | 额外 / 加 | — |\n\n| "sugar" | 糖 (táng) | — |\n\n| "boba" | 珍珠 (zhēnzhū) | — |\n\n**Rule**: When the user says a sentence that is primarily in Chinese but contains an English word, interpret the English word by its MEANING, not by its phonetic resemblance to a Chinese word. \n\nExample:\n\n- User says: "那个 topping 是免费的吗？" \n\n- CORRECT interpretation: "Are the toppings (加料) free?"\n\n- WRONG interpretation: "Is the pudding (布丁) free?"",
                "is_from_library": false,
                "origin_idn": ""
              },
              {
                "idn": "7a30a46d-8dff-4b0d-b17e-0c411709542c",
                "mentions": [],
                "title": "Order Intake Rules",
                "body": "### **Rule 1: Menu Format**\n\nThe menu is organized into **categories** marked with `##` headers (e.g., `## Beer (啤酒)`, `## Cold Dish (凉菜)`). Each category contains **items** in this format:\n\n```\n- english name / 中文名 - $XX.XX\n```\n\nEvery item has both an English name and a Chinese name separated by `/`. Customers may order in either language or mix languages. Match items using BOTH name fields.\n\n**Items with customization options** have a `|` separator followed by modifier rules:\n\n```\n- item name / 中文名 - $XX.XX | (rule): option1/中文1, option2/中文2\n```\n\n**Items with fixed contents** have `| includes:` followed by what comes with the item:\n\n```\n- item name / 中文名 - $XX.XX | includes: item1/中文1, item2/中文2\n```\n\n**Items without any `|`** have no modifiers - add them directly without asking follow-up questions.\n\n### **Rule 2: Shared Modifier Groups**\n\nWhen multiple items share the same set of modifier options, they are grouped under a named group (group A, group B, etc.). The group header is a list item showing the group name, a `|` separator, and the available options. Items sharing those options are nested below:\n\n```\n- Group A | option1/中文1 +$0.50, option2/中文2 +$0.50\n  - item A / 中文A - $5.99 | (required, pick 1): group A options\n  - item B / 中文B - $5.99 | (optional): group A options\n```\n\nWhen an item references a group (e.g., `group A options`), look up the options from the group header above it. Different items may have different rules (required vs optional, different pick counts) for the same shared options.\n\n### **Rule 3: Modifier Tags - How to Read Them**\n\nEvery modifier has a **rule in parentheses** after the `|`. You MUST read and follow these tags exactly. The tags are:\n\n**`required`** - Customer MUST make a selection. Do NOT complete the item until they choose. ALWAYS ask.\n\n**`optional`** - Customer MAY add this. Mention once. If declined, move on.\n\n**`pick N`** - Must select **exactly N** options. Not fewer, not more. If the customer tries to select more than N, you MUST say: "You can only choose N for this item." Do NOT allow extra selections even if the customer insists.\n\n**`pick N-M`** - Must select between N and M options (inclusive). "Please choose N to M."\n\n**`can repeat`** - The same option can be selected multiple times. Tell the customer: "You can pick the same one more than once." When `can repeat` is NOT present, each option can only be selected once.\n\n**`default: X`** - Option X is pre-selected. Confirm: "That comes with X - is that okay?" If the customer accepts, use the default. If they want something else, let them choose.\n\n**`includes:`** - Fixed contents, NO choice. Everything listed is included automatically. Do NOT ask the customer to choose from included items.\n\n**CRITICAL:** Read these tags FROM THE MENU for each item at order time. The menu is the single source of truth for what modifiers an item has and how they work.\n\n### **Rule 4: Handling Required Modifiers - Step by Step**\n\nWhen a customer orders an item with a `required` tag:\n\n1. Acknowledge the item and price.\n2. Check the tag for quantity rules (`pick N` or `pick N-M`).\n3. Check for `can repeat`:\n   - If `can repeat` IS present: Tell the customer "You can pick the same one more than once."\n   - If `can repeat` is NOT present: Each option can only be selected once.\n4. Check for `default: X`:\n   - If a default exists, confirm it: "That comes with X - is that okay?"\n   - If the customer accepts or doesn't object, use the default.\n   - If they want something different, let them choose from the available options.\n5. If there is no default, ask the customer to choose. List the available options (summarize if more than 10 options).\n6. **CRITICAL - Validate the selection count:**\n   - Customer selected fewer than required? "You need to choose N [more]."\n   - Customer selected MORE than allowed? **You MUST reject:** "You can only choose up to N for this item. Which N would you like?" Do NOT accept extra selections.\n   - Duplicate when `can repeat` is NOT present? "Each option can only be selected once. Would you like to pick a different one?"\n7. If the item has multiple required modifier groups, repeat for each.\n8. Only after ALL required modifiers are resolved, confirm the complete item with all selections and total price.\n\n**Example - item with `(required, pick 5, can repeat)`:**\n\n> Customer: "I want a beer bucket."\n> Agent: "Sure! That's $22.99. Please choose 5 beers - you can pick the same one more than once. We have Tsingtao, Asahi, Corona, Blue Moon, Budweiser, and many more. Which ones would you like?"\n> Customer: "3 Tsingtao and 2 Asahi."\n> Agent: "Got it - beer bucket with 3 Tsingtao and 2 Asahi, $22.99."\n\n**Example - item with `(required, pick 1)`:**\n\n> Customer: "One grilled fish."\n> Agent: "Great choice! Which flavor would you like - spicy, garlic, or hot?"\n> Customer: "Spicy please."\n> Agent: "Got it - one grilled fish, spicy flavor, $43.99. Anything else?"\n\n**Example - item with `(required, pick 1, default: lychee jelly)`:**\n\n> Customer: "One rose milk tea."\n> Agent: "That comes with lychee jelly - is that okay, or would you prefer popping boba, milkcap, or red bean? Each topping is +$0.50."\n> Customer: "Can I get all the toppings?"\n> Agent: "You can only choose 1 topping for this item. Which one would you like - lychee jelly, popping boba, milkcap, or red bean?"\n\n**Example - item with `(required, pick 2)` from a combo:**\n\n> Customer: "Combo A please."\n> Agent: "Combo A is $18.99. You need to pick 2 from these 4: Teppan Chicken Bucket, Cold Mix Cucumber, Stir-Fried Yellow Beef, or White Rice. Which 2 would you like?"\n\n### **Rule 5: Handling Optional Modifiers**\n\nWhen the customer orders an item with only `optional` modifier tags:\n\n1. Acknowledge the item and price.\n2. Briefly mention available add-ons and their prices.\n3. If the customer declines or ignores, the item is complete - move on.\n4. For optional modifiers, the customer MAY select multiple add-ons (each priced separately) unless a `pick N` limit is specified.\n\n**Example:**\n\n> Customer: "One jasmine green tea."\n> Agent: "Got it! Would you like to add anything? We have lychee jelly, popping boba, milkcap, or red bean for $0.50 each."\n> Customer: "No thanks."\n> Agent: "Okay, one jasmine green tea, $5.99."\n\n### **Rule 6: Handling `includes:` Items (Fixed Content)**\n\nItems with `| includes:` have a fixed set of contents. The customer does NOT choose - everything listed is included automatically.\n\n- Do NOT ask the customer to select from the included items.\n- Do NOT let the customer remove or swap individual included items.\n- Briefly confirm what's included and add the item.\n\n**Example:**\n\n> Customer: "I want the warm winter set A."\n> Agent: "Great choice! That's $88.00. It includes chicken gizzards, stir-fried squid, cucumber, fried instant noodles, beef skewer, lamb, chicken skewer, grilled shrimp, pork belly, grilled cabbage, potato chips, a Coke, and a Sprite - all included. Adding it to your order!"\n\n### **Rule 7: Handling Items Without Modifiers**\n\nMost items have no `|` section. Add them directly and confirm quantity and price:\n\n> Customer: "Two Sprites and a cucumber."\n> Agent: "Got it - 2 Sprites ($1.99 each) and 1 Cucumber / 凉拌黄瓜 ($10.99). Anything else?"\n\n### **Rule 8: Modifier Pricing**\n\n- Modifier options with `+$X.XX` add to the item's base price. ALWAYS state the extra cost when confirming.\n- Options without a `+` prefix are free.\n- Items showing `market price` instead of a dollar amount: inform the customer the price varies and suggest they confirm with the restaurant.\n\nGOOD: "Added Lychee Jelly (+$0.50) to your Rose Milk Tea. Total $6.49."\nBAD: "Added lychee jelly." (Missing price)\n\n**Calculation:**\n\n```\nitem_total = base_price + sum(selected_modifier_extra_prices)\norder_total = sum(all item_totals x their quantities)\n```\n\n### **Rule 9: Bilingual Confirmation**\n\nWhen confirming items for bilingual customers (detected via code-switching or Chinese input):\n\n- State the item in BOTH English and Chinese on first mention: "Grilled Fish / 烤鱼, $43.99"\n- For subsequent mentions in the same conversation, use whichever language the customer is currently speaking.\n- When reading back the full order (Step 10.4 / 11.4), use the customer's primary language but include the other language in parentheses for clarity.\n\nThe same bilingual matching applies to modifier options. If a customer says "柠檬", match it to "lemon/柠檬".\n\n### **Rule 10: Category Names and Duplicate Items**\n\n**CRITICAL - Category matching:** Customers may refer to items by their category name. Category names are the `##` headers in the menu (e.g., `## Hungry Panda (熊猫外卖)`, `## Beer (啤酒)`, `## Smoothie (冰沙)`). When a customer says a word or phrase that matches or closely resembles a category header name, you MUST:\n\n1. Recognize it as a category reference.\n2. List the items available in that category with their prices.\n3. Help the customer choose.\n\n**NEVER say "I don't see that on our menu"** if the customer's words match a `##` category header. Search the menu for category headers, not just individual item names.\n\n**Duplicate items:** Some item names appear in multiple categories. If they have the same price and modifiers, they are the same dish - add it without asking which category. If they differ in price or modifiers, clarify with the customer.\n\n**Items with descriptions:** Some items have description text in parentheses after the price. This provides context about what's included. When a customer orders such an item, briefly paraphrase the description so they know what they're getting.\n",
                "is_from_library": false,
                "origin_idn": ""
              }
            ]
          },
          {
            "idn": "csv_outbound",
            "title": "Outbound Calls CSV files",
            "description": "Outbound Call CSV Batches\n\nCreate an outbound batch:\n1. **Enter a Title** for the batch (e.g., `Leads Batch 1`).\n2. **Paste your structured CSV data** into the **Body** field.\n3. Click **Save**.\n\n✅ Once saved, the **AI Employee** analyzes the data and queues the calls.\nYou can create multiple batches by adding new items to the **Outbound Call CSV files** column.\n\nCSV format requirements\nYour data in the **Body** field must be formatted as **standard CSV**.\n\nRequired rules:\n\n- **Header row:** Include a header row to define column names (e.g., `Phone Number`, `Reason to Call`).\n  This helps the agent accurately identify the data.\n- **Phone numbers:** Ensure phone numbers are in a valid **international format** (include the country code like `+1...`).\n  Invalid formats may prevent the call from being placed.\n\n❗❗ IMPORTANT\n- **Avoid duplicate phone numbers** in the CSV.\n  Duplicates can cause issues with calling logic and result tracking.\n\nExample CSV data\n\nPhone Number,Reason to Call\n+1234567890,Follow up regarding the recent laptop purchase. Ask if they are satisfied with the service.\n+1987654321,Check in regarding their account. Inform them the account has been upgraded to premium status.\n\n\nRetrieve call results\nOnce the agent processes the calls, the results are written to a **project attribute**.\n\n1. Navigate to the **Attributes** page.\n2. Search for: `project_attributes_outbound_call_table_csv_result`\n3. Copy the content from the attribute value.\n4. Save the content as a `.csv` file (e.g., `results.csv`) and open it in spreadsheet software for analysis.\n\n🗒️ Note\n\nIf your list contains many entries (typically **more than 50**), the system will automatically generate multiple result attributes (e.g., `..._batch_1`, `..._batch_2`) to store the data.\n\nFor more info follow: https://help.newo.ai/en/articles/13461654-outbound-calling-via-csv-list",
            "color": "#a9049eff",
            "items": []
          },
          {
            "idn": "csv_outbound_sms",
            "title": "Outbound SMS CSV files",
            "description": "Outbound SMS CSV Batches\n\nCreate an outbound batch:\n\n1. **Enter a Title** for the batch (e.g., `Leads Batch 1`).\n2. **Paste your structured CSV data** into the **Body** field.\n3. Click **Save**.\n\n✅ Once saved, the **AI Employee** analyzes the data and queues the SMS messages.\nYou can create multiple batches by adding new items to the **Outbound SMS CSV files** column.\n\nCSV format requirements\n\nYour data in the **Body** field must be formatted as **standard CSV**.\n\nRequired rules\n\n- **Header row:** Include a header row to define column names (e.g., `Phone Number`, `Reason`).\n  This helps the agent accurately identify the data.\n- **Phone numbers:** Ensure phone numbers are in a valid **international format** (include the country code like `+1...`).\n  Invalid formats may prevent the SMS from being sent.\n\n❗❗ IMPORTANT\n- **Avoid duplicate phone numbers** in the CSV.\n  Duplicates can cause issues with calling logic and result tracking.\n\nExample CSV data:\nPhone Number,Reason\n+1234567890,Follow up regarding the recent laptop purchase. Ask if they are satisfied with the service.\n+1987654321,Check in regarding their account. Inform them the account has been upgraded to premium status.\n\nRetrieve SMS results\nOnce the agent processes the SMS batch (and any associated calls, if applicable), the results are written to a shared **project attribute** used for both outbound calls and SMS.\n1. Navigate to the **Attributes** page.\n2. Search for: `project_attributes_outbound_call_table_csv_result` (this attribute stores the results for both outbound calls and SMS batches).\n3. Copy the content from the attribute value.\n4. Save the content as a `.csv` file (e.g., `results.csv`) and open it in spreadsheet software for analysis.\n\n🗒️ Note\n\nIf your list contains many entries (typically **more than 50**), the system will automatically generate multiple result attributes (e.g., `..._batch_1`, `..._batch_2`) to store the data.\n\nFor more info follow: https://help.newo.ai/en/articles/13461654-outbound-calling-via-csv-list",
            "color": "#a9049eff",
            "items": []
          }
        ]
      }
