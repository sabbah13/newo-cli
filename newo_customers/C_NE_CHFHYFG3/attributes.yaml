      - **Bar seating**: Full bar with craft and imported beers, soju, and sake.
      Bar seating available on a first-come basis.

      - **Dietary accommodations**: Vegetarian options available. Please inform
      your server of any allergies.

      - **Delivery minimum**: $15 minimum order for delivery. $4 delivery fee
