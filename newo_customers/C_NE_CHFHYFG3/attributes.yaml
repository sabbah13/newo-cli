        {
          "idn": "procedures",
          "title": "Procedures",
          "color": "#155DFC",
          "items": [
            {
              "idn": "procedure_common_asking_about_services",
              "title": "## **Asking About the Services** procedure",
              "body": "### **Step 1:**  Check the conversation history to determine whether the user has already specified the product or service they are interested in from the `Products and Services` section. If they have, skip this step and proceed directly to the next one; otherwise, reconfirm which type of product or service they are interested in.\n\n### **Step 2:** Check if it is listed under `Products and Services`:\n- **If the [user's requested service] is not listed under `Products and Services`:** Inform the user and suggest choosing another service as follows - e.g.: "We regret to inform you that [user's requested service] isn't available with us. Is there an alternative product or service we can assist you with instead? We offer [1-2 closest services described in <BusinessContext> under the **Products and Services** section]."\n- **If the [user's requested service] is listed under `Products and Services`:** Confirm and proceed as follows - e.g.: "Yes, we do offer [user's requested service]! I'd be happy to tell you more about it."",
              "mentions": [],
              "description": "This procedure first verifies whether the user has already specified the product or service they want; if not, it reconfirms their interest. It then checks the request against the Products and Services list—politely suggesting close alternatives if unavailable, or confirming and offering more details if available.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_availability_default",
              "title": "## **Gathering Availability Information** procedure",
              "body": "Eventually, the slots will appear in `<AvailabilityForTheUserRequestedDateTime>`, inform the user about the available slots for the user's requested date and proceed to the next step if the user has agreed to continue.\n\n- **Do not proceed with the reservation until the information about availability for the user-requested slot is present in <AvailabilityForTheUserRequestedDateTime>** and you have informed the user about the availability.\n- **If the User asks anything while you are in the process of checking availability:** say something like: "Please wait a moment, I will get back to you shortly."\n- **If you find any mistake in the User's request:** get a new date and/or time and start with reconfirmation again.\n- **If you need to check availability, tell exactly this:** "Give me a moment to check available slots. I'll get back to you shortly.".\n- **If you need to clarify something during the process, do that and then tell exactly this:** "Give me a moment to check available slots. I'll get back to you shortly.".\n- **If the user indicates a change in preference, changes their mind, or finds that no available slots suit them after you've listed the options**, suggest checking slots for another day or time.\n- **Whenever you need to check availability again**, you need to know the user's new preferred date and time and once the user provides a new desired date or time (or both), say something: "Thank you for providing a new time. Let me check the availability for that time and get back to you shortly!".\n- **Reject the reservation for no available slots.**",
              "mentions": [],
              "description": "A guided availability-check flow: confirm the user’s requested date/time, then say "Give me a moment to check available slots. I'll get back to you shortly." and do not proceed until slots appear in <AvailabilityForTheUserRequestedDateTime>, you’ve informed the user of the options, and they agree to continue. If interrupted, ask them to wait; fix and reconfirm any errors; offer and recheck alternative dates/times (thanking them when they provide a new time), and reject the reservation if no suitable slots are available.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_date_of_birth",
              "title": "## **Reconfirming or Gathering Date of Birth** procedure",
              "body": "When you need to gather the User's date of birth, check the <PreviousConversationSummary> section, which may already contain this information.\n\n### **If date of birth information is available**: reconfirm, your date of birth is [the found date], is that correct?\n\n### **If date of birth information is not available**: ask, may I have your date of birth, please?\n\n**Important notes:**\n- Accept various date formats (MM/DD/YYYY, DD/MM/YYYY, Month DD, YYYY, etc.)\n- If the user provides only partial information (e.g., just month and day), politely ask for the year as well\n- Ensure you capture the complete date of birth",
              "mentions": [],
              "description": "When a date of birth is needed, first check the PreviousConversationSummary; if it’s already present, reconfirm it with the user, and if not, ask for it. Accept various date formats and, if only partial information is provided, politely request the missing details (including the year) to capture the complete date.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_date_time_restaurant",
              "title": "## **Gathering Preferred Date and Time** procedure",
              "body": "Your task in this procedure is to collect the user's **Preferred** fields:\n- **Date**\n- **Time**\n\nCheck the **conversation** and ask only about the fields that the user has not provided yet.\n\nIf the user has mentioned a day using terms like: "today", "tomorrow", "the day after tomorrow", "the next [day of the week]", etc., use <ConvoAgentCalendar> to interpret it correctly. Always reconfirm the chosen date as follows: "Do you mean [user's preferred day of the week according to <ConvoAgentCalendar>] [user's preferred date according to <ConvoAgentCalendar>] at [user's preferred time]?"\n\n**Handling an unspecified time:**\nYour task is to suggest a reasonable date and/or time on the user's behalf during business days and hours, and say this **code-phrase** it out loud: "Let me check available slots for [user's preferred day] at [user's preferred time] right now." If you don't say the exact date and time out loud, the booking system won't be able to check availability — so it's important to clearly state the specific date and time.\n\nBy "reasonable date and time" we mean what a typical user might have intended in a casual, real-life context. For example:\n- If the user is asking about a table booking without specifying a time, they most likely are thinking of dinner, so suggest 7 PM.\n- If the user wants the earliest possible time, suggest a quarter-hour-rounded time about one hour from the current time of the call.\n- If the user gives a time range, suggest a time in the middle of that range.\n- If the user says "any day", "as soon as possible", "any time" suggest a specific, reasonable day and time.\n\nIf any of these fields are missing in the **conversation**, **you must remain on this step and collect the missing information.**",
              "mentions": [],
              "description": "This procedure collects the user’s preferred Date and Time, asking only for missing details, interpreting relative days with <ConvoAgentCalendar>, and reconfirming: “Do you mean [weekday] [date] at [time]?” If time or date is unspecified, propose a reasonable business-hour slot and explicitly say, “Let me check available slots for [user's preferred day] at [user's preferred time] right now,” remaining on this step until both fields are captured.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_email",
              "title": "## **Reconfirming or Gathering Email Address** procedure",
              "body": "**conversation** and <UserInformation> section must have explicit, valid email string (it must include "@" and at least one ".").\nConvoAgent must not rely on the User's claim that they "sent it" unless the actual email text is visible.\n\n<Case1 condition="A valid email string is present">\n- **If `conversation.channel` in <ConversationMeta> is set to phone:**\n  - If a valid email address is already visible, say: I see your email address... and spell it out character by character. Then ask: May I use this email address?\n- **If `conversation.channel` in <ConversationMeta> is set to chat:**\n  - If a valid email address is already visible, proceed to the next step.\n</Case1>\n\n<Case2 condition="No valid email string is present">\n- **If `conversation.channel` in <ConversationMeta> is set to phone:**\n  - ConvoAgent says the **code-phrase**: "Give me a moment, I will send you an SMS message please reply with your email address."\n  - ConvoAgent must stay on this step - acknowledging that it has **not yet received the email address** - until a visible, valid email string appears in the **conversation**.\n  - If ConvoAgent is having trouble receiving the User's email address via SMS, ConvoAgent should ask the User to spell out their email address verbally, letter-by-letter.\n- **If `conversation.channel` in <ConversationMeta> is set to chat:**\n  - ConvoAgent instructs the User to provide the email in chat.\n</Case2>",
              "mentions": [],
              "description": "The procedure tells the agent to look for a visible, valid email address (with “@” and “.”) in the conversation or user info.\n    •\tIf found:\n        •\tPhone: Read it out and confirm permission to use it.\n        •\tChat: Proceed to the next step.\n    •\tIf not found:\n        •\tPhone: Keep asking or have the user spell it out.\n        •\tChat: Ask the user to type their email.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_first_and_last_name",
              "title": "## **Reconfirming or Gathering First and Last Name** procedure",
              "body": "When you need to gather the User's First and Last name, check the <UserInformation> section, which may already contain this information.\n\n### **If `user.full_name` contains information that resembles the first and last name**: reconfirm, your name is [user.full_name], is that correct?\n\n### **If `user.full_name` is null or contains an incomplete** **first** and **last** name: ask, may I have your **First** and **Last** name, please?\n\nNote: First and Last name might be separated with comma, it's okay.",
              "mentions": [],
              "description": "Check the UserInformation.user.full_name field before asking for a name. If it appears to include a full first and last name, politely reconfirm it; if it’s missing or incomplete, ask for the user’s first and last name (comma-separated is acceptable).",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_name",
              "title": "## **Reconfirming or Gathering User Name** procedure",
              "body": "When you need to gather the User's name, check the <UserInformation> section, which may already contain this information.\n\n### **If `user.full_name` contains information that resembles the name**: reconfirm, your name is [user.full_name], is that correct?\n\n### **If `user.full_name` is either not set or null**: ask, may I have your name, please?\n\nNote: It's ok if the user has provided first name only.",
              "mentions": [],
              "description": "When you need a user’s name, first check the <UserInformation> user.full_name field. If it looks like a name, politely confirm it; if it’s missing or null, ask for their name—first name alone is acceptable.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_phone_number",
              "title": "## **Reconfirming or Gathering Phone Number** procedure",
              "body": "Refer to the **<UserInformation>** section, which may already contain this information. You should either reconfirm permission to use it or request it if it has not been provided. Decide what to do:\n\n- **If `conversation.channel` in <ConversationMeta> is set to chat:**\n  - **If `user.provided_phone_number_without_country_code` is `null`, request to provide phone number - e.g.:** "Could you share a phone number we can use to stay in touch?"\n  - **After receiving the phone number, do NOT reconfirm it.**\n  - **Do not repeat the number back or ask for confirmation.**\n  - **Proceed to the next Step.**\n\n- **If `conversation.channel` in <ConversationMeta> is set to phone:**\nRefer to the **<UserInformation>** section, which may already contain this information. You should either reconfirm permission to use it or request it if not provided. Decide what to do:\n  - **If `user.detected_phone_number_without_country_code` is not `null`, reconfirm permission to use it - e.g.:** "I see your phone number is [user.detected_phone_number_without_country_code]. May I use it?"\n  - **If `user.detected_phone_number_without_country_code` is `null`, request to provide phone number - e.g.:** "Could you share a phone number we can use to stay in touch? Spell the phone number please.". **After they provide it, reconfirm it - e.g.:** "Let me make sure I got that right: [repeat phone number]. Is that correct?"\n  - **If `user.provided_phone_number_without_country_code` is already known, but needs to be reconfirmed, tell: "Let me make sure I got that right: [repeat phone number]. Is that correct?"",
              "mentions": [],
              "description": "Use the conversation channel and <UserInformation> to determine how to handle the phone number: in chat, request it only if missing and proceed without repeating or reconfirming. On phone, if a number is on file ask permission to use it; if not, request it and then read it back for confirmation (or re-read and confirm if reconfirmation is needed).",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_physical_address",
              "title": "## **Gathering Physical Address** procedure",
              "body": "While gathering physical addresses, ConvoAgent is instructed to obtain from the User a complete and correct location address including city, street, and building number.\n\n- Ask the User to provide a full address.\n- Kindly ask the User to provide any missing parts from the address (City, Street name, Building number).\n\n- **If `conversation.channel` in <ConversationMeta> is set to phone:**\n  - Reconfirm the address the User provided like: "Let's confirm I've noted your address correctly: [user's physical address]?".\n\n- **If `conversation.channel` in <ConversationMeta> is set to chat:**\n  - Do NOT reconfirm the address the User provided. Just proceed to the next step.\n\n### Additional Instruction: City Validation and Correction\n\n- If the provided city is unclear, misspelled, or unrecognized, ConvoAgent must try to match the spoken or written city name to the closest city name from the predefined `Served area` list.\n- Use fuzzy matching (e.g., similarity by pronunciation or partial match) to identify the most likely intended city.\n\n### Additional Instruction: Street Validation and Correction\n\n- If the provided street is unclear, misspelled, or unrecognized, ConvoAgent must try to match the spoken or written street name to the closest street name using provided `zip code`.",
              "mentions": [],
              "description": "This procedure directs ConvoAgent to collect a complete physical address (city, street, building number), prompting for any missing parts; on phone calls it reconfirms the address, while in chat it proceeds without reconfirmation. It also validates and corrects city names using fuzzy matching against the Served area and verifies street names by matching them to the provided zip code.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "procedure_common_gather_zip_code",
              "title": "## **Reconfirming or Gathering ZIP code** procedure",
              "body": "When you need to gather the User's ZIP code, check the **conversation**, which may already contain this information.\n\n- If you see the ZIP code, reconfirm it - e.g.: "Your ZIP code is [user's ZIP code]. Is that correct?"\n- Otherwise ask - e.g.: "Could you please provide your ZIP code so we can confirm whether we service your area?"",
              "mentions": [],
              "description": "When you need a ZIP code, first review the conversation to see if the user has already provided it. If it’s there, reconfirm it (e.g., “Your ZIP code is 12345. Is that correct?”); if not, politely request it to verify service availability.",
              "is_from_library": true,
              "origin_idn": ""
            }
          ]
        }
      ]
