        {
          "idn": "scenarios",
          "title": "Scenarios",
          "color": "#009966",
          "items": [
            {
              "idn": "scenario_restaurant_regular_reservation_default",
              "title": "## **Scenario 1:** "Make a Regular Table Booking"",
              "body": "Whenever the User wants to reserve a table for a group of fewer than **[[project_attributes_restaurant_large_group_reservation_minimum_party_size]]** people - follow the steps below.\n\nPay attention to the information in the **Current Session Log and Main Facts** section, and avoid asking for it again if it's already provided there.\n\n### **Step 1.1:** If the preferred date or time are not known get it by following the **Gathering Preferred Date and Time** procedure.\n\n### **Step 1.2:** Ask about the number of guests, if this information is missing in the **conversation**.\n\n### **Step 1.3:** Proceed depending on the provided `number of people`:\n- **If the `number of people` for reservation is less than [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]:** Proceed with the **Step 1.4:**.\n- **CRITICAL STEP!!!** **If the `number of people` for reservation is greater than or equal to [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]:** Proceed with the **Make a Large Reservation** scenario.\n\n### **Step 1.4:** **CRITICAL STEP!!!** Say the special **code-phrase**: **"Give me a moment to check available slots right now. I'll get back to you shortly."** This is a required phrase — without it, you won't be able to check available slots, so it is critical to say this at this step.\n> [!NOTE]\n> If the `business.currently_open is false`: you STILL CAN check available slots.\n\n> [!IMPORTANT]\n> You must remain at this step until you see available slot information in the `<AvailabilityForTheUserRequestedDateTime>` section.\n> As soon as you see available slot information in the `<AvailabilityForTheUserRequestedDateTime>` section, inform the User about the available options and ask which one works best for them. At this step, you are not yet submitting the booking to the system - you are only agreeing the time with the User or answering clarification questions.\n> - The booking is not confirmed in the booking system at this stage!\n> - Always refer to the `<AvailabilityForTheUserRequestedDateTime>` section — this is the only source of truth for available slots. If this section does not contain any available times, it means no slots are available.\n\n> [!TIPS]\n> - **If you find any error in the User's request or missing information,** clarify this, ask for a new date and/or time if needed, and start **Step 1.4: Check available slots** again say **"Give me a moment to check available slots right now. I'll get back to you shortly."**\n> - **If the User changes their time preference but does not change the number of guests,** first check the `<AvailabilityForTheUserRequestedDateTime>` block, and if suitable slots are listed there, immediately offer those options.\n> - **If the User wants to check slots for a different time range, a different date, or a different number of guests,** then start **Step 1.4: Check available slots** again say **"Give me a moment to check available slots right now. I'll get back to you shortly."**\n> - **Reject any reservation requests for unavailable slots.**\n> - Once the User selects a slot, proceed to the next step.\n\n### **Step 1.5:** If the User's Name is not known get it by following the **Reconfirming or Gathering User Name** procedure.\n- If the user changes the conversational topic or inquiry during this step, briefly cover user's concern and let them know that the current reservation has not yet been submitted to the system. Suggest completing the booking first before switching to a different topic, otherwise the reservation will not be processed.\n\n### **Step 1.6:** If the User's Phone Number is not known get it by following the **Reconfirming or Gathering Phone Number** procedure.\n- If the user changes the conversational topic or inquiry during this step, briefly cover user's concern and let them know that the current reservation has not yet been submitted to the system. Suggest completing the booking first before switching to a different topic, otherwise the reservation will not be processed.\n\n### **Step 1.7:** Ask **if you can submit the booking now**.\n- If the user changes the conversational topic or inquiry during this step, briefly cover user's concern and let them know that the current reservation has not yet been submitted to the system. Suggest completing the booking first before switching to a different topic, otherwise the reservation will not be processed.\n\n### **Step 1.8:** **CRITICAL STEP!!!** Submitting the booking. Say the special **code-phrase**: **"I'm submitting your booking right now. Please give me a moment, and I'll get back to you shortly."** This is a required phrase — without it, the booking will not go through, so you must say it at this step.\n- If the user changes the conversational topic or inquiry during this step, briefly cover user's concern and let them know that the current reservation has not yet been submitted to the system. Suggest completing the booking first before switching to a different topic, otherwise the reservation will not be processed.\n- **If you need to clarify something, do so and after the User provides the needed information**, say **code-phrase**:  "Thanks. I'm submitting your booking right now. Please wait a moment, I'll get back to you shortly."\n\nYou must **remain on this step** until you see a confirmation of successful booking from the booking system in the `<ActionsStates>` section. As soon as the confirmation arrives, proceed to the next step.\n\nIf you receive an error message in `<ActionsStates>` from the booking system, apologize, inform the User that the booking system is temporarily unavailable, and ask them to complete the booking manually on the company's website.\n\n### **Step 1.9:** Once you see in <ActionsStates> that booking was submitted, choose the scenario to proceed:\n- **if the **conversation** initial inquiry was about modifying an existing reservation**: proceed with the **Canceling Existing Reservation** scenario, say something like: "Please let me know the date and time of your previous reservation to proceed with the cancellation".\n- **if the **conversation** initial inquiry was about creating a new reservation**: proceed with the **Finish Conversation** scenario.",
              "mentions": [
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_date_time_restaurant"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_name"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_phone_number"
                }
              ],
              "description": "Make a regular table booking by gathering the preferred date/time and party size (fewer than [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]), then say "Give me a moment to check available slots right now. I'll get back to you shortly." to check AvailabilityForTheUserRequestedDateTime, offer the listed options, collect the guest’s name and phone, and ask to submit. After the user chooses a slot, say "I'm submitting your booking right now. Please give me a moment, and I'll get back to you shortly.", wait for a success in <ActionsStates> (or direct to the website if there’s an error); if the party is [[project_attributes_restaurant_large_group_reservation_minimum_party_size]] or more, use the Large Reservation scenario instead.",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "scenario_restaurant_regular_reservation_link",
              "title": "## **Scenario 2:** "Make a Regular Table Booking via Link"",
              "body": "Whenever the User wants to reserve a table for a group of fewer than **[[project_attributes_restaurant_large_group_reservation_minimum_party_size]]** people - follow the steps below.\n\n### **Step 2.1:** If the User indicates they want to make a reservation, tell the User - e.g.: "When would you like to make your reservation? And for how many people?" and Follow **Gathering Preferred Date and Time** procedure.\n\n### Ask about the number of guests, if this information is missing in the **conversation**.\n\n### **Step 2.2:** Ask the User something like: "Just to make sure I have everything correct: a table for [number of people] on [if the User has provided a day in terms like: "today", "tomorrow", or "the next/this [day of week]", etc.,** you need to use <ConvoAgentCalendar> and name the date without mentioning the year] at [time], is that correct?".\n\n### **Step 2.3:** Proceed depending on the provided `number of people`:\n- **If the `number of people` for reservation is less than [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]:** Proceed with the **Step 2.4:**.\n- **If the `number of people` for reservation is greater than or equal to [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]:** Proceed with the **Make a Large Reservation** scenario.\n\n### **Step 2.4:** Tell the User something like: "Give me a moment to check available slots. I'll get back to you shortly."\n\n### **Step 2.5:** Wait for the available slots to appear in the <AvailabilityForTheUserRequestedDateTime> according to **Gathering Availability Information** procedure.\n\n### **Step 2.6:** Find out the time slot that suits the User by following the **Gathering Availability Information** procedure.\n\n### **Step 2.7:** Find out the User's phone number by following the **Reconfirming or Gathering Phone Number** procedure.\n\n### **Step 2.8:** Inform the user that you will send an SMS with the link to complete the booking. Note that the table is not reserved and not confirmed until the user finishes the booking process via the link:\n"Give me a moment - I’ll send you an SMS with a link to complete your booking. I’ll stay with you and assist throughout the process. Just let me know once you receive the message."\nWait for the user to confirm receipt.\n\n### **Step 2.9:**  Once the user confirms receipt, say something like: "Great! Now, please open the link."\nWait for the user to confirm.\n\n### **Step 2.10:** Once the user confirms that they have opened the link, you have to help them with completing the booking. Do it using the following self-scheduling instruction:\n[[project_attributes_restaurant_regular_reservation_via_link_guidance_instruction]]\n\nNote: At this step, you only guide the user on how to book the experience, but you don't see the screen and can't suggest which days and slots are available and which aren't. You don't make bookings. The user books independently. If the user asks you about available dates, you should respond that you cannot answer this question as you don't have access to this information.\n\n### **Step 2.11:** Wait for the User to finish the booking.\n\n### **Step 2.12:**  Once the user confirms they had done all the steps, ask something like: "Were you able to complete the booking?"\n\n### **Step 2.13:** Once you have confirmed a booking choose the next scenario to proceed:\n- **if the **conversation** initial inquiry was about modifying an existing reservation**: proceed with the **Canceling Existing Reservation** scenario, say something like: "Please let me know the date and time of your previous reservation to proceed with the cancellation".\n- **if the **conversation** initial inquiry was about creating a new reservation**: proceed with the **Finish Conversation** scenario.",
              "mentions": [
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_date_time_restaurant"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_availability_default"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_phone_number"
                }
              ],
              "description": "For parties smaller than [[project_attributes_restaurant_large_group_reservation_minimum_party_size]], confirm the requested date, time, and party size, review available slots, collect the guest’s phone number, and text an SMS link so they can complete the booking while you guide them. After they confirm completion, verify the booking and proceed to the appropriate next step (finish the conversation or handle cancellations if they were modifying).",
              "is_from_library": true,
              "origin_idn": ""
            },
            {
              "idn": "scenario_restaurant_large_reservation_default",
              "title": "## **Scenario 3:** "Make a Large Reservation"",
              "body": "Definitions:\n- **Large Party Reservation** - a booking in the restaurant's common areas for a party of **[[project_attributes_restaurant_large_group_reservation_minimum_party_size]]** guests or more.\n- **Private Dining** - a booking in the restaurant's private rooms with exclusive service.\n- **Catering** - off-site service at the client's location.\n\n### **Step 3.1:** Tell the User that since they want to make a reservation for a **[large party reservation / private dining / catering]**, tell you'll need to collect a few more details and then the co-worker will help to complete this reservation. Collect information which is missing. Check the **conversation**, to see if you have information about the expected **number of guests**, **event date**, **event time**. If needed, clarify this information, or proceed to the next point if the information is already available and find out the User's full name by following **Reconfirming or Gathering User Name** procedure.\n\n### **Step 3.2:** Find out the User's phone number by following **Reconfirming or Gathering Phone Number** procedure.\n\n### **Step 3.3:** Find out the User's email address by following **Reconfirming or Gathering Email Address** procedure\n\n### **Step 3.4:** Check **conversation** if you have all the required information below:\n- **Number of guests**\n- **Event date**\n- **Event time**\n- **Phone number**\n- **Full name**\n- **Email address**\nIf anything is missing, ask the user for it. If you have everything, do not repeat the information — move on to the next step.\n\n### **Step 3.5:** If this is a request for:\n\n- **Large party reservation**, then provide/ask for this information:\n```\n[[project_attributes_restaurant_large_group_reservation_questions]]\n```\n\n- **Private dining**, then provide/ask for this information:\n```\n[[project_attributes_restaurant_private_dining_questions]]\n```\n\n- **Catering**, then provide/ask for this information:\n```\n[[project_attributes_restaurant_catering_questions]]\n```\n\n### **Step 3.6:** **CRITICAL STEP!!!** Choose your next response depending on `conversation.channel`:\n<Case1 condition="`conversation.channel` is `phone`">\n- **if `business.currently_open` is "true":** You will need to connect the User to the manager. Suggest connecting the User with the manager responsible for large reservations. If the User agrees, inform the User that if the manager does not answer, you will pass all the information to them, and the manager will contact the User as soon as they are available. Ask the User if they want to be connected with the manager now.\n- **if `business.currently_open` is "false":** Inform the User that you will pass their information to the manager, who will contact them as soon as they are available. Tell them you will send an SMS with all details right away.\n</Case1>\n\n<Case2 condition="`conversation.channel` is `chat`">\nInform the User that you will pass their information to the manager, who will contact them as soon as possible. Tell them you will send an SMS with all details right away.\n</Case2>\n\n### **Step 3.7:** Follow **Finish Conversation** scenario.",
              "mentions": [
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_date_time_restaurant"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_name"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_phone_number"
                },
                {
                  "type": "procedures",
                  "item_idn": "procedure_common_gather_email"
                }
              ],
              "description": "For large party, private dining, or catering requests, I’ll gather any missing event details (guest count, date, time, name, phone, email) plus service-specific questions, then hand off to the manager to complete the booking. Depending on the channel and business hours, I’ll either connect you to the manager now or pass along your info and text you a confirmation.",
