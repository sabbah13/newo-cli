  - idn: project_attributes_rag_knowledge_base_append_websites
    value: " "
    title: 3-06-D. RAG - Knowledge Base - Websites [A]
    description: >-
      Append information scraped from websites to your RAG (Retrieval Augmented
      Generation) Knowledge

      Base.


      **Purpose:** This attribute allows you to incrementally add new knowledge
      without overwriting

      existing entries. The system automatically scrapes specific URLs, extracts
      relevant information,

      converts it into structured AKB topics, and appends them to your agent's
      knowledge base.


      **Usage:**


      - Provide a list of website addresses (URLs) and instructions on what data
      to extract into this
        field.
      - Once the agent has finished reading the sites, this field will be
      cleared automatically.

      - A historical record of your instructions will be logged in the
        `project_attributes_rag_knowledge_base_append_websites_log` field immediately after successful
        scraping and processing.

      **Example:**


      ```txt

      Website: https://example.com

      Objective: Collect information about pricing and services offered

      Keywords: pricing, services


      Website: https://another-example.com

      Objective: Gather details on customer testimonials and reviews

      Keywords: testimonials, reviews

      ```


      **Important Constraints:**


      - **Character Limit:** The text extracted from the site must fit within
      system limits (~100,000
        characters). For very large websites, try adding specific pages one by one.
      - **Processing Time:** Reading websites is asynchronous. It can often take
      10 minutes or more for
        the agent to finish scraping and start using the information.

      **Workflow:**


      1. You provide the URLs and instructions here.

      2. The system visits the websites and reads the content
         (`project_attributes_private_dynamic_rag_knowledge_base_append_websites_text`).
      3. The content is converted into a format the agent understands
         (`project_attributes_private_dynamic_rag_knowledge_base_append_websites_text_structured`).
      4. New AKB topics are created under the `GeneralManagerAgent` and tagged
      with
         `rag_autogenerated_from_websites`.
      5. Your instructions and URLs are saved to your history log (`..._log`),
      and this field is reset to
         empty.

      **Key Behaviors:**


      - **Independence:** Your "Text memory" and "Website memory" are separate.
      Resetting one does not
        affect the other.
      - **Equality:** The agent treats information from text and websites with
      the same importance,
        choosing what to use based on how relevant it is to the current conversation.
      - **Freshness:** Newer records are prioritized over older ones if they
      contain similar or updated
        information.
      - **Updates:** To update information you've previously added, use the
        `project_attributes_rag_knowledge_base_append_websites_reset` attribute to clear the memory before
        re-adding the site.
    group: 3. Knowledge Base
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
