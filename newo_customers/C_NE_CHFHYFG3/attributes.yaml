    title: 3-07. Restaurant Menu [A]
    description: >-
      This attribute stores the restaurant's menu as plain text, which is then
      used by the system for

      handling orders and recommendations.


      To ensure the menu is properly formatted, it is recommended to include:


      - Dish name

      - Description (ingredients, preparation style, special features)

      - Category (e.g., "appetizers", "main courses", "desserts", "beverages")

      - Price


      Example:


      ```txt

      - **Margherita Pizza**

      Description: Classic Italian pizza with tomato sauce, fresh mozzarella,
      and basil.

      Category: Main Course.

      Price: $12.99.

      - **New York Cheesecake**

      Description: A creamy, rich cheesecake with a crunchy base.

      Category: Desserts.

      Price: $7.50.

      ```


      If the menu includes this information, the system can better understand
      customer requests and find

      the right dishes during conversations.
    group: 3. Knowledge Base
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_restaurant_regular_events_schedule
    value: " "
    title: 3-08. Restaurant Regular Events - Schedule [A]
    description: >-
      This attribute stores information about regular events in plain text.


      It can be used to specify the schedule of recurring events so that the
      Agent can inform customers

      about them.


      What to include in this attribute:


      - Event name (e.g., "Live Music,")

      - Days and times (e.g., "Every Friday at 7:00 PM" or "Every first Sunday
      of the month")

      - Short description (e.g., "free participation")

      - Additional conditions (e.g., "Pre-registration required,", "Reservation
      mandatory")


      Example:


      ```txt

      **Live Music:** Every Friday from 7:00 PM to 10:00 PM. Performances by
      local jazz musicians. Free entry.

      ```


      If this information is added, the Agent will be able to inform customers
      about regular events when

      they inquire about activities at a specific location.
    group: 3. Knowledge Base
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_restaurant_signature_dishes
    value: >-
      Based on customer favorites and order frequency:


      1. **Xinjiang Special Lamb (新疆红柳大羊):** Our #1 seller - authentic
      Xinjiang-style lamb skewered on red willow branches and grilled over
      charcoal. Bold cumin and chili seasoning. $3.99/skewer.


      2. **Mongolia Beef (蒙古大牛):** Tender beef skewers with a smoky char and
      Mongolian spice blend. A must-order alongside the lamb. $3.99/skewer.


      3. **Grilled Fish (烤鱼):** Whole fish with your choice of Spicy (香辣),
      Garlic (蒜蓉), or Mala (麻辣) Sichuan seasoning. Serves 2-3. $43.99.


      4. **Skewer Hot Pot (麻辣涮串锅):** 30 skewers in a bubbling spicy broth with
      quail egg, fish ball, beef tripe, mushroom, and more. $34.99.


      5. **Beer Bucket (酒桶):** Pick any 5 from 21 imported and craft beers.
      Great for groups. $22.99.


      6. **Warm Winter Set A (暖冬A餐):** The ultimate feast - 13 items including
      skewers, stir-fries, cold dishes, and drinks for $88.00.


      7. **Spicy Szechuan Boiled Fish (水煮斑鱼片):** Tender grouper fillets in fiery
      Sichuan chili oil broth. $20.99.
    title: 3-09. Restaurant Signature Dishes [A]
    description: >-
      This attribute contains a list of the restaurant's signature or most
      popular dishes highlighted for

      customers.


      This list helps the Agent quickly recommend the restaurant's best and most
      well-known dishes to

      guests. It is important to note that this attribute should not include the
      entire menu – for that,

      use `project_attributes_restaurant_menu`.


      What to include in this attribute:


      - Dish name (e.g., "Tomahawk Steak", "Truffle Pasta")

      - Short description (e.g., "A juicy, bone-in steak grilled to perfection",
      "Homemade pasta with a
        white truffle sauce")
      - Dish category (e.g., main course, appetizer, dessert)


      Example:


      ```txt

      - **Tom Yum Kung** – Traditional Thai soup with shrimp, coconut milk, and
      aromatic spices.

      - **Pasta Carbonara** – Classic Italian pasta with a sauce made from eggs,
      Pecorino cheese, and pancetta.

      - **New York Cheesecake** – A creamy dessert made with rich cream cheese
      and a crunchy biscuit base.

      ```


      By including only key dishes in this attribute, the restaurant can
      highlight its best offerings and

      help the Agent provide more accurate recommendations to customers.
    group: 3. Knowledge Base
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
