                  }
                ],
                "description": "Use this flow to make a standard reservation for parties smaller than [[project_attributes_restaurant_large_group_reservation_minimum_party_size]]: check the session log to avoid re-asking details, confirm or gather the number of guests and the user’s phone number, then send an SMS with the booking link. If the party size meets or exceeds the threshold, switch to the Large Reservation scenario; after the user books, proceed to Cancellation if they were modifying an existing reservation, or Finish Conversation if it was a new booking.",
