    title: 1-01-A. Business Name [A]
    description: |-
      Short business name (2-5 words) for email headers, SMS, and signatures.

      Include location for businesses with multiple locations.

      Examples:

      > Menlo Tavern

      > Image Orthodontics - Pacific Heights
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_name_phonetic
    value: " "
    title: 1-01-B. Business Phonetic Name [B]
    description: >-
      To accurately pronounce the business name, it is sometimes necessary to
      provide the phonetic

      transcription of the original name. The system uses this phonetic
      transcription to pronounce the

      business name in the Voice greeting phrase.


      You need to fill this attribute as follows:


      - Format: IPA phonetic transcription

      - Example: `/griːn æpl/`
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_country
    value: United States
    title: 1-02-A. Business Country [A]
    description: >-
      The country where your business is located.


      Currently, this attribute has limited use, but it may be utilized in
      future features.


      If your business is presented in multiple countries, provide all countries
      separated by commas.

      Example:


      > `United States, Canada, United Kingdom`
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_address
    value: 888 Grant Avenue, San Francisco, CA 94108
    title: 1-02. Business Address [A]
    description: >-
      For single-location businesses, provide the complete physical address.


      For multi-location businesses, provide the complete physical address of
      the specific location this

      agent supports.


      For call centers, provide the complete legal address of the organization
      or the complete address of

      the headquarters.
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_public_phone
    value: "14158882688"
    title: 1-03. Business Phone (Public Phone) [A]
    description: >-
      The official phone number for your business as it appears publicly on your
      website, Google Maps,

      Yelp, OpenTable, or social media.


      If your business has multiple locations, provide the published number for
      the specific location

      you're creating this agent for.


      For call center agents, provide the main call center number. If you have
      multiple public phone

      numbers, please list them all, separated by commas.


      **Note:** Public phone number is used by the agent for providing
      information.


      **Format options:**


      - With plus: `+12223334444`

      - Without plus: `12223334444`


      Both formats are accepted, but make sure to include the full country code
      in all entries.


      **Important:** Escalation phone numbers must be different from public
      phone numbers to prevent the

      agent from calling itself recursively.
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_story
    value: >-
      Crimson Wok brings the bold, smoky flavors of Northern Chinese street BBQ
      to the heart of San Francisco's Chinatown. Founded by a family of grill
      masters from Harbin, we specialize in hand-threaded Xinjiang lamb skewers
      grilled over natural charcoal, Sichuan-style grilled fish, fiery hot pots,
      and a curated selection of Asian craft beers and soju. Our open kitchen
      lets you watch the flames dance as your skewers sizzle to perfection.
      Whether you're craving a quick lunch of BBQ combos or a late-night feast
      with friends over a beer tower, Crimson Wok is where fire meets flavor.
    title: 1-04. Business Description [A]
    description: >-
      A brief description of your business in 1-2 paragraphs, highlighting what
      you do and what makes you

      unique.


      Example:


      ```txt

      Bevri (Georgian for "a lot") tempts with cheesy khachapuri, juicy khinkali
      dumplings, and flavorful

      grilled meats. Explore our unique Georgian wines too! Dine in Palo Alto or
      order delivery. Savor the freshest ingredients and vibrant flavors sourced
      from the diverse regions of Georgia. Our menu features a delightful array
      of traditional Georgian dishes prepared with a modern touch.

      ```
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_website_url
    value: https://www.crimsonwokbbq.com
    title: 1-05. Business Website Link (URL) [A]
    description: >-
      The official website for the business.


      If your business has multiple locations, provide the specific website for
      the location you're

      creating this agent for.


      If you're creating an agent for a call center, provide the main website
      for the entire network.


      The agent can use this website address in conversations. For example, if
      the agent doesn't know the

      answer to a question, it could say:


      > I don't have information on that topic, but you can find more details on
      our website. I'll send

