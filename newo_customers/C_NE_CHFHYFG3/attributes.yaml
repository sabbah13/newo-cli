    title: Calculation Context [B]
    description: >-
      If you need the agent to calculate pricing for products and services you
      have to do following:


      1. List your products and services full pricing in this field as shown in
      **Pricing Example**

      2. Ensure `project_attributes_settings_newo_tools` contains a matching
      condition to trigger
         **calculation tool** as shown in **Enabling Tool Example**.
      3. Describe the rules of how to calculate it properly in
         `project_attributes_setting_calculation_rules`.

      **Pricing Example:** Products and services pricing.


      ```

      **Laser hair removal upper legs**

      - 1 session: 10$

      - 5 sessions: 40$

      **Laser hair removal full legs**

      - 1 session: 12$

      - 5 sessions: 50$


      **Active special offers**

      - Laser hair removal full legs 8 sessions: 80$

      ```


      **Enabling Tool Example:**


      Trigger in `project_attributes_settings_newo_tools` has to be filled as
      follows:


      ```json

      {
        "tools": {
          "calculation_tool": {
            "description": "The agent calculates the price and informs the user about it.",
            "conditions": {
              "agentPromised": {
                "type": "boolean",
                "description": "The agent promised to calculate the approximate estimate price right now exactly in their last message (enclosed in <LatestConvoAgentAnswer>)."
              }
            },
            "useConversationHistory": false
          }
        }
      }

      ```


      `conditions` is an object containing one or more conditions, conversation
      must match to execute

      calculation.
