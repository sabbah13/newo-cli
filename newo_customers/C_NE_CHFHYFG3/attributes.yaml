    title: Dynamic (LLM-based) - Reports - Session Ended Report Content JSON [C]
    description: >-
      This Attribute is used when sending the session-ended report and is based
      on the configuration of

      `project_attributes_setting_session_ended_report_content`.


      **Note:** This attribute is automatically generated and should not be
      modified manually.


      **How it works:**


      - The system automatically creates this attribute based on the
      session-ended report settings

      - It stores the structured JSON content that is included in the report

      - When a session ends, this JSON data is used to format and send the
      report

      - This attribute is auto-generated - no manual changes are needed

      - The content is determined by
      `project_attributes_setting_session_ended_report_content`
    group: 8. System
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.json"
