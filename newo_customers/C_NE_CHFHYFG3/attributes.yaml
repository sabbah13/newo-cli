  - idn: project_attributes_support_log_document_link
    value: " "
    title: Support Log Document Link (URL) [B]
    description: >-
      This document is created to facilitate information exchange between you
      (the business client) and

      your Implementation and Support Partner, Technical Owner, and Account
      Manager.


      In this document, you can record your requests regarding the agent's
      behavior and log any behavioral

      issues. Your support partner will also use this document to track the
      status of your tasks and

      document agent testing results.


      If this attribute is empty, it means that the `Support Log Document` has
      not yet been created.


      To create it, you need to:


      1. Open the
         <a href="https://drive.google.com/drive/folders/1WDyVbQ6-uNPv3R9b3krzK0glCpt5nyio" target="_blank">TEMPLATES
         folder (read-only)</a>.
      2. Open a corresponding industry (refer to `project_business_industry`)
      inside the `TEMPLATES`
         folder
      3. Make a copy of an industry-specific template

      4. Share your copy with your team and your support partner

      5. Insert the URL link to your copy into this attribute

      6. Click the `Save` button
    group: 6. Support - Advanced
