  - idn: >-
      project_attributes_setting_products_and_services_background_check_availability_enabled
    value: "False"
    title: Products & Services - Check Availability In the Background [B]
    description: >-
      This setting controls whether requested service validation is performed in
      the background.


      It is especially useful when dealing with a large number of services to
      ensure more accurate service

      availability checks.


      When enabled, service validation runs in the background, reducing agent's
