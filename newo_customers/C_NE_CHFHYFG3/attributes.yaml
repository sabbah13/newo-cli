  - idn: project_attributes_restaurant_bill_minimum_catering
    value: "900"
    title: 5-14. ASR - Minimum Bill Amount For Catering [A]
    description: >-
      This setting defines the minimum bill amount required for catering orders
      and is used in ASR

      (Average Sales Revenue) calculations.


      It ensures that revenue calculations meet a baseline amount, even if the
      per-person bill total is

      lower.


      How it works:


      - The value should be a number, representing the minimum amount (in
      currency) required for a
        catering order
      - If a catering order's total falls below this value, the minimum bill
      amount will be used instead
        for ASR calculations
      - Helps ensure more accurate revenue tracking for catering services


      Example usage:


      - Average bill per person: $30

      - Number of people: 10

      - Total calculated amount: 10 × $30 = $300

      - Minimum catering bill set: $500

      - Since $300 is below the minimum, the ASR calculation will use $500
      instead.
