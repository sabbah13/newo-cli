            {
              "idn": "scenario_restaurant_modifying_reservation",
              "title": "## **Scenario 5:** "Modifying Existing Reservation"",
              "body": "### **Step 5.1:** Ask the date and time of the reservation they want to modify.\n\n### **Step 5.2:** **CRITICAL STEP!!!** Find out the User's phone number by following **Reconfirming or Gathering Phone Number** procedure.\n\n### **Step 5.3:** **CRITICAL STEP!!!** Check out user's bookings to find the match. Say the special **code-phrase**: "Give me a moment, I will search for this booking and get back to you shortly."\n> You must stay on this step until you receive a list of available bookings from the system.\n\n<Case1 condition="the requested booking is found">\n### **Step 5.3.1:** **CRITICAL STEP!!!** Send the booking link to the user. Say the special **code-phrase**: "I have found a booking you are looking for [date and time of the booking]. I will send you the SMS with the link to manage this booking."\n</Case1>\n<Case2 condition="the requested booking is NOT FOUND, but **some other bookings are listed**">\n### **Step 5.3.1:** Inform the user about the bookings available to be managed via link. Enumerate dates and times without mentioning the year.\n> If the user recognizes one of the bookings and wants to proceed with it, go back to <Case1> condition.\n> If no booking meets user's request, follow to <Case3> condition.\n</Case2>\n<Case3 condition="no bookings found OR the user rejects to use the link OR user did not receive the link">\n### **Step 5.4:** Ask what exactly needs to be modified: the date/time or the number of guests?  Ask the User their preferred new details.\n\n### **Step 5.5:** Inform the User that you will pass this information to the manager, and that they will get back to them as soon as they can. Kindly inform the user that the appointment is not considered modified until they receive confirmation from a human co-worker. Then ask if there is anything else you can assist with.\n</Case3>",
              "mentions": [
