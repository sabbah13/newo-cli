  - idn: project_attributes_setting_asr_recognition
    value: "40"
    title: ASR - Working Hours Recognition [A]
    description: >-
      This is a **normalization coefficient** used to estimate what portion of
      all deals closed by the AI

      Receptionist can be attributed **exclusively to the AI Receptionist**
      (i.e. the deals that would

      have been lost before the AI Receptionist was implemented).


      Businesses lose a different percentage of deals depending on the time of
      day.


      - **Non-working hours**. During non-working hours, we
      assume—simplified—that the business used to
        lose **100% of deals**. Therefore, all deals that the AI Receptionist now closes during
        non-working hours are considered **fully attributable to the AI Receptionist**. As a result, for
        non-working hours this coefficient is set to **100%**.
      - **Working hours.** During working hours, by default we assume that, on
      average, businesses used to
        lose **about 30% of deals** because they could not respond to inquiries fast enough.

      However, note that the value of this normalization coefficient depends on
      the **Redirection Type**:


      - **For overflow mode ("first-human-then-AI")**: This coefficient is set
      to **100%**, because in
        this mode the AI Receptionist only handles calls that the human staff have already missed.
        Therefore, all deals closed by the AI Receptionist in this mode are considered **fully its
        achievement**.
      - **For non-overflow mode ("first-AI-then-human")**: In this mode, the AI
      Receptionist handles **all
        deals** for the business — both the ones the human staff used to close successfully before
        implementation and the ones they used to lose. Therefore, only the share of deals that were
        previously lost should be attributed exclusively to the AI Receptionist.

      For example, suppose the AI Receptionist closes 10 deals in this mode.
      Before its implementation,

      suppose human colleagues used to close 7 of those 10 and lose 3. So it
      would be incorrect to

      consider all 10 as additional revenue. In this case, we apply a **30%
      coefficient**, meaning that

      only **30% of the 10 deals** are considered exclusively attributable to
      the AI Receptionist.
    group: 5. Reports - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.number"
