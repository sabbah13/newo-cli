  - idn: project_attributes_setting_transfer_call_phone_numbers
    value: " "
    title: >-
      4-16. Transfer Call to Manager - Advanced Phone Number Selection & Rules
      [B] [IMPORTANT]
    description: >-
      Leave this field empty if you are using the same escalation numbers
      specified in the fields

      `project_business_non_working_hour_escalation_phone` and

      `project_business_working_hour_escalation_phone` for all your scenarios.


      **How this field affects call transferring depending on working hours:**


      - **During working hours:** Populating this field satisfies the
      working-hours requirement even if
        `project_business_working_hour_escalation_phone` is empty (you must have at least one of Attribute
        specified).
      - **Outside working hours:** This field does **not** replace
        `project_business_non_working_hour_escalation_phone`. You must still set
        `project_business_non_working_hour_escalation_phone`; if field
        `project_business_non_working_hour_escalation_phone` is empty, the agent will not transfer after
        hours and will relay information instead (if
        `project_attributes_setting_session_ended_report_enabled` is `True`).

      **Format options:**


      - With plus: `+12223334444`

      - Without plus: `12223334444`


      Both formats are accepted, but make sure to include the full country code
      in all entries.


      Phone number extensions (internal phone numbers) are supported. To add an
      extension, use the

      following format: `+12223334444#1234` (without spaces or any additional
      symbols).


      If you use different escalation numbers for different scenarios, specify
      them here.


      For example, you have three scenarios: standard booking, group booking,
      and emergency calls. If you

      want each scenario to have its own escalation number, specify it in this
      field:


      ```txt

      **During working hours:**

      - Standard booking: +12223334444

      - Group booking: +12223335555

      - Emergency calls: +12223337777

      **Outside working hours:**

      - Standard booking: +12223334444

      - Group booking: +12223335555

      - Emergency calls: +12223337777

      ```
