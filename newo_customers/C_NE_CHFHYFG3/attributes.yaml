                "body": "The caller is clearly attempting to sell something, conduct telemarketing, running a scam, or is an unsolicited robocall unrelated to our services. Unclear, garbled, or nonsensical speech is NOT spam - it indicates transcription issues.\nConvoAgent responds with something like: *"I'm afraid I can't assist you with that"* and informs that it ends the conversation now.",
