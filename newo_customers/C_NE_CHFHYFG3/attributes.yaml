    value: "False"
    title: Data Injection - Timer Is Running [C]
    description: >-
      Indicates whether the timer for data injection is currently active.


      Data is not being fetched when the timer is active.


      This attribute indicates that a timer with interval set at

      `project_attributes_setting_data_injection_update_period` is currently
      running. This attribute needs

      no manual interaction.


      To disable data injection use
      `project_attributes_setting_data_injection_is_enabled`. The timer will

      turn off with the agent's next conversation turn.
