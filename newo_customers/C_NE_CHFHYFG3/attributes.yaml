  - idn: project_attributes_setting_common_phone_numbers
    value: "["16505473761","16505075606","13109488438"]"
    title: 1-12. Common (Shared) Phone Numbers [A]
    description: >-
      The "common phone numbers" field contains phone numbers that can be used
      by multiple people, such as

      a hotel's reception desk phone number which is used by different employees
      to answer calls.


      If a user calls from one of these specified phone numbers, each call will
      be classified as

      "anonymized" which helps the agent avoid classifying all calls from the
      same number as related to a

      single persona. Instead, each call will create a temporary unique persona.


      **Example:**


      ```json

      ["13334445556", "12223334455"]

      ```


      **Format options (for each phone number in the list):**


      - With plus: `+12223334444`

      - Without plus: `12223334444`


      Both formats are accepted, but make sure to include the full country code
      in all entries.
    group: 1. Business
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.json"
