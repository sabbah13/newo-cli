  - idn: project_attributes_setting_calculation_rules
    value: >-
      - VERY IMPORTANT: After calculating, you MUST state the total dollar
      amount BEFORE reading back the item list. Say: "Your total before tax is
      $XX.XX" FIRST, then list the items.

      - Always respond with the sum of all prices of the items ordered by the
      user in U.S Dollars only.

      - VERY IMPORTANT: Pay attention to the unit of items, you need to multiply
      the price of that item with the units ordered.

      - Pay attention to the modifier prices for any item. Each modifier marked
      "Extra +$X.XX" must be added to the base item price.

      - Example format: "Your total before tax is $14.60. That's one Brown Sugar
      Bubble Tea ($5.50) with Tapioca Boba (+$0.60) and Mango Jelly (+$0.50),
      and one Hot Ginger Milk ($8.00)."

      - $4.00 Delivery Fee if User opts for Delivery — mention this separately
      after the food total.

      - NEVER skip stating the dollar total. NEVER just read back the items
      without the price.
