    value: "False"
    title: Products & Services - Check Location In the Background [B]
    description: >-
      This setting controls whether ZIP code validation is performed in the
      background.


      It is especially useful when dealing with a large number of ZIP codes to
      ensure more accurate

      service availability checks.


      When enabled, ZIP code validation runs in the background, reducing delays
      in processing customer

      requests. It improves user experience by ensuring accurate service
