  - idn: project_attributes_private_dynamic_workflow_builder_canvas
    value: |-
      {
        "title": "Workflow Builder",
        "types": [
          {
            "idn": "introduction",
            "title": "Introduction",
            "description": "The Introduction scenario is the starting point for all conversations between the user and the AI Employee. It is always designated as Scenario 0.\n\nPrimary objective:\nThe AI Employee will greet the user and identify the reason for their inquiry. It will also gather the minimum information needed to determine the next step by:\n* Identifying the intent type (e.g., Regular Table Booking, General Information Request, Guest Support)\n* Collecting critical parameters (e.g., reason for contact, desired date/time, specific service requests)\n\nThe AI Employee remains in this scenario until all required information is collected and confirmed. Once complete, the system transitions to the appropriate scenario based on the identified intent (per the Intent Type Map).\n\nFormatting rules:\n\n1. Title\nAlways use: ## Scenario 0: “Introduction”\n\n2.1 Body (Numbering)\nAlways use the format: ### **Step 0.X:** [instruction], where X is the step number.\nExample: ### **Step 0.1:**, ### **Step 0.2:**, ### **Step 0.3:**\n\n❗❗ IMPORTANT\nNumber steps sequentially, and they must match the scenario number (i.e., Scenario 0 → Steps 0.1, 0.2, 0.3, etc.).\n\n2.2 Body (Instructions)\nEach step describes one conversational action, such as:\n* Asking a question\n* Confirming information\n* Transitioning to another scenario\n\nFor more info follow: https://help.newo.ai/en/articles/12952879-introduction-scenario-formatting",
            "color": "#45556C",
            "items": [
              {
                "idn": "2f0521b1-f47c-4e4f-bf1c-7b1b1ca55323",
                "title": "## **Scenario 0:** "Introduction"",
                "body": "In this scenario, you must determine the **required fields**:\n- **reason for their call**\n\n> [!IMPORTANT]  \n> if it's a reservation request, you must determine also the following fields:\n> - **number of guests**\n> - **date** \n> - **time** \n\nYou must remain in this scenario until you have gathered this information.\n**Goal**\n1. Identify the caller's reason for calling.\n\n### **Step 0.1:** ConvoAgent greets the user.\n\n### **Step 0.2:** If the caller has not yet stated the reason for the call, ask something like: "Would you like to place an order, book a table, or is there anything else I can help you with?". Otherwise, proceed to the next step.\n\n> [!NOTE]\n> If the user's very first message contains a specific question (e.g., "Do you have mango smoothie?", "你们有芒果冰沙吗？", "How much is the fried chicken?"), you MUST answer that question FIRST before asking about order type or gathering other required fields. The user's question IS their reason for calling - it tells you they want to order. Answer the user's questions and then smoothly gather the remaining required fields (pickup/delivery, etc.).\n> Example:\n> User: "你好，你们有芒果冰沙吗?"\n> CORRECT: "有的！芒果冰沙是$X.XX。您今天想点外卖还是自取呢?"\n> WRONG: "您好! 请问您是要外卖还是自取?" - This ignores their question.\n\n### **Step 0.3:** Start the relevant scenario based on the **IntentTypeMap**.",
                "mentions": [],
                "description": "This scenario is an intake step that first clarifies the caller’s reason for contacting and, for reservations, gathers all required details: number of guests, date, and time. If the reason isn’t stated, the assistant asks how it can help and remains in this step until all required fields are captured, then routes to the appropriate flow per the IntentTypeMap.",
                "is_from_library": false,
                "origin_idn": "scenario_restaurant_introduction"
              }
            ]
          },
          {
            "idn": "intent_types",
            "title": "Intent Types",
            "description": "Intent Types define the categories of user intentions that the AI Employee can recognize and respond to. Each intent type represents a possible goal or purpose of the user's interaction, such as requesting a service, submitting feedback, updating personal information, or seeking support.\n\nPrimary objective\n\nAn intent type typically maps to one or more scenarios, guiding the conversation flow based on what the user wants to accomplish. These definitions form the foundation of the AI Employee's decision-making process, allowing it to route the conversation to the appropriate conversational flow dynamically.\n\nFormatting rules:\n1. Title\nAlways use: ## [L/T if applicable] **<Intent Name>**\nExamples:\n\n## **General Inquiry**\n\n## **[L] Appointment Request**\n\n## **[T] Cancellation**\n\nIntent classification markers – optional:\n[L] - Lead Intent: Used when the conversation represents a potential lead, opportunity, or conversion (e.g., a request, reservation, or inquiry that could result in a sale or engagement).\n[T] - To Do Intent: Used when the conversation outcome requires manual follow-up or internal action by a manager or team member after the session (e.g., callbacks, confirmations, or approvals).\n\n2. Body\n\nEach intent must describe a single, clearly defined user goal or request. If the Intent description matches the user's intent in the conversation, tell the ConvoAgent to perform a specific action. The action can be time-based, for example, during working hours, do this, or during non-working hours, do that. The format is as follows:\n[Intent description]\n[AI Employee/general actions, e.g., "Start Scenario 5" or "Respond with 'We are closed.'"]\n\nAttribute references and context injection\n\nIntents can reference Attributes using the format: [[attribute Idn]]\nExample: [[project_representative_agent_name]]\n\nFor more info follow: https://help.newo.ai/en/articles/12952913-intent-type-formatting",
            "color": "#E60076",
            "items": [
              {
                "idn": "3d467448-13fd-4c44-9257-25899e580600",
                "mentions": [],
