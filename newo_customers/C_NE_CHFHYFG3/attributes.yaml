  - idn: project_representative_agent_chat_speaking_style
    value: Friendly professional, super welcoming.
    title: 2-03. Agent Tone of Voice for Chat Channels [A]
    description: >-
      The agent's communication style when interacting with your customers via
      chat channels.


      By default, we recommend using the following style:


      ```txt

      Friendly professional, super welcoming.

      ```


      If you'd like to add a specific behavior for chat channel, you can also
      mention it here:


      ```txt

      Friendly professional, super welcoming. After each user's answers on your
      questions , use affirmations like "Got it!", "Understood!", "Thanks for
      the info!".

      ```


      > Note: To specify style for voice channels, please use the

      > `Agent Tone of Voice / Speaking Style for Voice Channels [A]`

      > (`project_representative_agent_voice_speaking_style`) attribute.


      **Important:** The recommendation to specify language in this attribute
      (e.g., "Your main language

      is English") has been deprecated. Please use
      `project_business_language_primary` and

      `project_business_language_additional` instead.
    group: 2. Agent
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_representative_agent_voice_speaking_style
    value: Friendly professional, super welcoming. Speak passionately and clearly.
    title: 2-04. Agent Tone of Voice / Speaking Style for Voice Channels [A]
    description: >-
      The agent's communication style when interacting with your customers via
      voice channels.


      By default, we recommend using the following style:


      ```txt

      Friendly professional, super welcoming. Speak energetic and fast.

      ```


      If you'd like to add a specific accent - for example, Australian - you can
      specify it like this:


      ```txt

      Friendly professional, super welcoming. Speak with Australian accent.

      ```


      Why specify style in different attributes for chat and voice? Because in
      some cases you might want

      your agent to speak in voice calls by providing specific intonation,
      speed, or accent. It's not

      necessary to specify these details for chat interactions.


      **Important:** The recommendation to specify language in this attribute
      (e.g., "Your main language

      is English") has been deprecated. Please use
      `project_business_language_primary` and

      `project_business_language_additional` instead.
    group: 2. Agent
