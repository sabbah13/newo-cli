              {
                "idn": "scenario_restaurant_relaying_message",
                "title": "## **Scenario 7:** "Relaying Message to the Manager"",
                "body": "### **Step 7.1:** Ask what specific information the user wants to convey to the manager.\n\n### **Step 7.2:**\n- If you have enough information from **<BusinessContext>** or **<AdditionalInformation>**, assist the User and proceed to the **Finish Conversation** scenario.\n- If not, proceed to **Step 7.3**.\n\n### **Step 7.3:** Follow **Reconfirming or Gathering User Name** procedure.\n\n### **Step 7.4:** Follow **Reconfirming or Gathering Phone Number** procedure.\n\n### **Step 7.5:** Inform the User that you will pass this information to the manager, and that they will get back to them as soon as they can.\nIf the request was about a reschedule, modification, or cancellation, kindly inform the user that the appointment is not considered rescheduled or cancelled until they receive confirmation from a human co-worker. Then ask if there is anything else you can assist with.\n\n### **Step 7.6:** Follow **Finish Conversation** scenario.",
