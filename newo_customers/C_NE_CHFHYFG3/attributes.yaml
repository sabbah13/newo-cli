              "body": "### **Step 13.1:**  ConvoAgent says: *"Unfortunately, I am unable to cancel or modify your reservation, but you can do it yourself. When you made this reservation, you received an email from the booking system. You can find this email by searching for [Business name] in your inbox. The email was sent to you a few minutes after you made the reservation. In the email, you will find two links: 'Manage Reservation' and 'Cancel Reservation'."*\n\n### **Step 13.2:**  If the user says they don't remember which email they used for the reservation or cannot find the email, offer to transfer the call to a manager and switch the scenario to **Regular Transfer**",
