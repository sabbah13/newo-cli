    title: Conversation - Waiting Mode - Fallback Instruction [C]
    description: >-
      This setting defines the fallback instruction used by the agent when
      waiting for result from third

      party services is exceeded.


      Example:


      ```txt

      Suggest to the user that you will relay the information to the manager,
      and they will reach out as soon as they are available.

      ```
    group: 4. Agent Behavior - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_setting_waiting_mode_timeout
    value: "60"
    title: Conversation - Waiting Mode - Timeout [C]
    description: >-
      This setting defines the maximum time (in seconds) the agent will wait for
      a response from

      third-party services. For example, if it usually takes no more than 15
      seconds to check availability

      or book an appointment, set this timeout to 25 seconds. This allows the
      agent to wait long enough

      for the response to arrive.


      If something goes wrong and the response takes longer, the agent will exit
      the waiting mode and

      follow the fallback instruction set in

      `project_attributes_setting_waiting_mode_fallback_instruction`.


      Recommendation: If your third-party services take longer to respond, set
      this timeout to be slightly

      greater than their average response time. This ensures the agent doesn't
      return to the user too

      early with "error".
    group: 4. Agent Behavior - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.number"
