  - idn: project_attributes_outbound_call_table_csv
    value: ""
    title: Outbound - Call Table CSV [A]
    description: >-
      **Important:** This attribute is going to be deprecated in future
      versions. Please use Widgets to

      manage outbound CSV. To learn how to use Widgets for outbound CSV, please
      follow

      [this
      guide](https://help.newo.ai/en/articles/13461654-outbound-calling-via-csv-list).


      This attribute contains the CSV data for outbound calls.


      Populate this attribute with content in CSV format to define the outbound
      call table.


      Preferred CSV columns are:


      - Phone number

      - Reason to call


      But it is possible to use any other columns as well. The agent will use
      this data to make outbound

      calls. Agent will try to get phone numbers and reason to call based on the
      input content anyway.


      Recommendations:


      - Use header row in CSV to define column names to make it easier for the
      agent to identify the data.

      - IMPORTANT! Ensure phone numbers are in a valid format (e.g., include
      country code). Otherwise, the
        agent might not be able to make the call.
      - Keep the reason to call concise and clear. Otherwise, it might be
      interpreted incorrectly by the
        agent.
      - IMPORTANT! Avoid putting duplicate phone numbers in the CSV. Otherwise,
      it will lead to issues
        with calling and call tracking.

      The result of calling will be stored in another attribute called `Outbound
      - Calling Result CSV [A]`

      (`project_attributes_outbound_call_table_csv_result`).


      Example:


      ```csv

      Phone Number,Reason to Call

      +1234567890,Needs to be followed up regarding the recent purchase.
      Product: Laptop. Ask if they are satisfied with the service and if they
      have any questions

      +1987654321,Check in regarding their account. Updates: Account has been
      successfully upgraded to premium status.

      ```
    group: 4.1. Outbound
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_outbound_call_table_csv_result
    value: ""
    title: Outbound - Calling Result CSV [A]
    description: >-
