    title: 2-11. Voice - Voicemail Detection Behavior Instruction [A]
    description: >-
      Instruction for the agent on how to behave when a voicemail is detected
      during an outbound call. You

      can put instruction like:


      ```txt

      Leave a brief message including the business name and phone number and say
      goodbye.

      ```


      **Important:** If you want the agent to hang up right after it finishes
      leaving a voicemail, make

      sure to instruct the agent to say goodbye in your instruction. Otherwise,
      the agent may stay on the

      line for about 30 seconds longer (due to an extra fallback timer to stop
      the call) before hanging

      up.


      **Note:** If the Agent is instructed to say a long phrase during voicemail
      detection, potentially,

      the `project_attributes_setting_voice_stop_call_timeout` Attribute value
      must be adjusted

      (extended). Signs of when it needs to be adjusted: Agent does not finalize
      its speech and hangs up

      the call (for example, Agent says only a half of the sentence and then
      call is being ended).
