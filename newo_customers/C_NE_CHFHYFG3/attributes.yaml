      # **Service coverage**

      - **Served area:** null

      - **Served zip codes:** []


      # **Supported payment methods**

      All major credit cards, debit cards, NFC mobile payments, and cash.


      # **Current specials, promotions, discounts, happy hour deals**

      null


      # **Signature dishes**

      Based on customer favorites and order frequency:


      1. **Xinjiang Special Lamb (新疆红柳大羊):** Our #1 seller - authentic
      Xinjiang-style lamb skewered on red willow branches and grilled over
      charcoal. Bold cumin and chili seasoning. $3.99/skewer.


      2. **Mongolia Beef (蒙古大牛):** Tender beef skewers with a smoky char and
      Mongolian spice blend. A must-order alongside the lamb. $3.99/skewer.


      3. **Grilled Fish (烤鱼):** Whole fish with your choice of Spicy (香辣),
      Garlic (蒜蓉), or Mala (麻辣) Sichuan seasoning. Serves 2-3. $43.99.


      4. **Skewer Hot Pot (麻辣涮串锅):** 30 skewers in a bubbling spicy broth with
      quail egg, fish ball, beef tripe, mushroom, and more. $34.99.


      5. **Beer Bucket (酒桶):** Pick any 5 from 21 imported and craft beers.
      Great for groups. $22.99.


      6. **Warm Winter Set A (暖冬A餐):** The ultimate feast - 13 items including
      skewers, stir-fries, cold dishes, and drinks for $88.00.


      7. **Spicy Szechuan Boiled Fish (水煮斑鱼片):** Tender grouper fillets in fiery
      Sichuan chili oil broth. $20.99.


      # **Events schedule**

      null


      # **Terms and Conditions & House Rules**

      - **Accessibility**: Wheelchair-accessible entrance and seating available.

      - **Bar seating**: Full bar with craft and imported beers, soju, and sake.
      Bar seating available on a first-come basis.

      - **Dietary accommodations**: Vegetarian options available. Please inform
      your server of any allergies.

      - **Delivery minimum**: $15 minimum order for delivery. $4 delivery fee
      applies.

      - **Payment methods**: All major credit cards, debit cards, NFC mobile
      payments, and cash accepted.

      - **Reservations**: Walk-ins welcome. Reservations recommended for parties
      of 4+ and required for 7+.

      - **Cancellation policy**: Please cancel reservations at least 2 hours in
      advance.

      - **Gratuity**: 18% gratuity added for parties of 7 or more.


      # **Frequently asked questions (FAQ)**

      Q: What type of cuisine do you serve?

      A: We specialize in Chinese BBQ skewers, Sichuan-style grilled fish, hot
      pot, and Northern Chinese dishes. Everything is grilled to order over
      natural charcoal.


      Q: Do you have vegetarian options?

      A: Yes! We offer grilled vegetables, tofu skin skewers, mushrooms, corn,
      eggplant, grilled cabbage, and more. Our cold dishes include cucumber
      salad and preserved egg with tofu.


      Q: What's your most popular dish?

      A: Our Xinjiang Special Lamb skewers and Mongolia Beef skewers are
      customer favorites. The Grilled Fish with Mala flavor is also hugely
      popular.


      Q: Do you offer delivery?

      A: Yes, we offer both pickup and delivery. There is a $15 minimum for
      delivery orders and a $4 delivery fee.


      Q: Do you take reservations?

      A: Yes! We accept reservations for any party size. For groups of 7 or
      more, we recommend calling ahead so we can prepare the best seating for
      you.


      Q: Do you have happy hour?

      A: Yes! Happy Hour runs weekdays (excluding holidays) from 3PM to 6PM with
      15% off all drinks at our bar.


      Q: Can I see the menu?

      A: Absolutely! I can send you a link to our full menu via text message.


      Q: Do you have private dining?

      A: We can accommodate private dining for larger groups. Please call to
      discuss arrangements and we'll connect you with our events manager.


      Q: What languages do you speak?

      A: Our staff speaks English, Mandarin, and Cantonese. Our AI assistant Mei
      can speak English, Chinese, and many other languages.
