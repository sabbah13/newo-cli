              "description": "A guided flow for agents to schedule an appointment: confirm services, gather preferred date/time, use the required phrase to check availability, present options from the AvailabilityForTheUserRequestedDateTime section, then collect name, phone, and email. After user approval, use the required submission phrase, wait for booking confirmation (or report system error), and then close the conversation.",
