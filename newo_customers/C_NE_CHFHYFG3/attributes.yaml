  - idn: project_attributes_private_custom_schema_inbound_call_report
    value: " "
    title: Reports - Phone Inbound - Custom Schema [C]
    description: >-
      This setting helps to capture important details from a conversation
      automatically at the end of a

      session. It extends the list of values that the agent extracts from the
      conversation by default.


      **How it works:**


      - A predefined `template (schema)` tells the system what information to
      look for in the conversation

      - If a detail is mentioned by the user, it is captured and stored

      - If a detail is missing, the system sets it to `Not Provided` instead of
      leaving it blank

      - All collected details are saved in session logs, making it easy to
      access and analyze later


      **Example of schema used for data extraction:**


      ```json

      {
        "type": "object",
        "properties": {
          "organization": {
            "type": "string",
            "description": "Set to the organization name provided by the user. If the user didn't mention an organization name, set it to "Not Provided"."
          },
          "job_title": {
            "type": "string",
            "description": "Job title provided by the user. If the user didn't mention a job title, set it to "Not Provided"."
          }
        },
        "required": ["organization", "job_title"]
      }

      ```


      **Example of what it captures:**


      If a user shares their company name and job title during the conversation,
      the system records:


      - Organization: "ABC Corp"

      - Job Title: "Marketing Manager"


      If they don't mention this information, the system saves:


      - Organization: "Not Provided"

      - Job Title: "Not Provided"


      **Why it is useful**


      - Saves important details automatically

      - Ensures no critical information is missed

      - Organizes data clearly for future use


      This makes it easy to review past conversations and use the captured
      information for reports,

      insights, or follow-ups.
    group: 5. Reports - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.json"
