    title: Conversation - Additional Global Conversation Instruction [C]
    description: >-
      Additional instruction being injected into the conversational prompt.


      This is the so-called "Bart rule" (a reference to The Simpsons series,
      where Bart writes on the

      chalkboard over and over).


      The value of this attribute is inserted into UserMessageReply in a highly
      visible place. As a

      result, the Agent pays close attention to its content. However, this is a
      very dangerous attribute.

      In fact, it should only be used in emergency situations when it is
      URGENTLY necessary to correct the

      Agent's behavior.


      **If there is too much information, it can lead to unexpected behavior.**


      Ideally, this attribute should contain 2-3 sentences that clearly state
      what the agent will or will

      not do.


      Example:


      ```txt

      I will always tell the price and mention that it may change. I will never
      ask about the user's birth date.

      ```
