  - idn: project_attributes_setting_transfer_call_enabled
    value: "True"
    title: 4-12. Transfer Call to Manager - Enabled [B] [IMPORTANT]
    description: >-
      Keep this field set to `True` if you allow the agent to transfer calls to
      your human co-workers in

      certain scenarios.


      If you prohibit the agent from transferring calls to your human
      co-workers, change the value to

      `False`.


      **To make call transfers work when this Attribute value is `True`:**


      - **Outside working hours:** You must fill
      `project_business_non_working_hour_escalation_phone`. If
        it’s empty, the agent will **not** transfer; it will relay information instead (if
        `project_attributes_setting_session_ended_report_enabled` is `True`).
      - **During working hours:** You must fill **at least one** of:
        `project_business_working_hour_escalation_phone` or
        `project_attributes_setting_transfer_call_phone_numbers`. If both are empty, the agent will
        **not** transfer; it will relay information instead (if
        `project_attributes_setting_session_ended_report_enabled` is `True`).
    group: 4. Agent Behavior
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
  - idn: project_business_non_working_hour_escalation_phone
    value: " "
    title: "4-13. Transfer Call to Manager - Phone # Non-Working Hours [A] [IMPORTANT]"
    description: >-
      Phone number to which calls should be forwarded during non-working hours
      if a client requests a

      transfer, especially in the case of emergencies.


      **Required for after-hours transfers**. If this field is empty, the agent
      will **not** transfer

      calls outside working hours; it will relay information instead (if

      `project_attributes_setting_session_ended_report_enabled` is `True`).


      **Format options:**


      - With plus: `+12223334444`

      - Without plus: `12223334444`


      Both formats are accepted, but make sure to include the full country code
      in all entries.


      Phone number extensions (internal phone numbers) are supported. To add an
      extension, use the

      following format: `+12223334444#1234` (without spaces or any additional
      symbols).


      **Important:**


      - This escalation phone number must differ from any public phone numbers
      to prevent the agent from
        recursively calling itself.
      - If you need to specify different forwarding numbers for various
      situations (e.g., large group
        reservations vs. emergencies), you can do so in the dedicated
        `project_attributes_setting_transfer_call_phone_numbers` field. Use this space to provide the most
        general escalation number.
      - Note that even if you configure after-hours numbers in
        `project_attributes_setting_transfer_call_phone_numbers`, this field must still be set for
        after-hours transfers to be attempted.
    group: 4. Agent Behavior
    is_hidden: false
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_business_working_hour_escalation_phone
    value: " "
    title: "4-14. Transfer Call to Manager - Phone # Working Hours [A] [IMPORTANT]"
    description: >-
      The phone number to which the agent should forward calls during working
      hours if your customer

      requests to be transferred to an operator due to emergencies or other
      scenarios.


      **Required for working-hours transfers**. During working hours, you must
      fill **at least one**

      Attribute: this field **or**
      `project_attributes_setting_transfer_call_phone_numbers`. If both are

      empty, the agent will **not** transfer; it will relay information instead
      (if

      `project_attributes_setting_session_ended_report_enabled` is `True`).


      **Format options:**


      - With plus: `+12223334444`

      - Without plus: `12223334444`


      Both formats are accepted, but make sure to include the full country code
      in all entries.


      Phone number extensions (internal phone numbers) are supported. To add an
      extension, use the

      following format: `+12223334444#1234` (without spaces or any additional
      symbols).


      **Important:** The escalation phone number must be different from the
      public phone numbers to

      prevent the agent from recursively calling itself.


      Additional Information: If your business needs to forward calls to
      different phone numbers based on

      the situation (e.g., one number for large group reservations and another
      for emergencies), you can

      specify these numbers in the dedicated
      `project_attributes_setting_transfer_call_phone_numbers`

      field. In the "Escalation Phone Number" field above, please provide the
      most common escalation

      number.
