  - idn: project_attributes_setting_session_ended_webhook_url
    value: " "
    title: Reports - Webhook - Link (URL) [C]
    description: >-
      This setting determines a URL to send HTTP request at the end of the
      session.


      If this attribute is empty, no webhook will be sent.


      If the attribute is set, at the end of each session the agent will send a
      POST request to the

      provided URL with `application/json` payload.


      The payload will be a JSON object following

      `project_attributes_setting_session_ended_webhook_schema` JSON schema.


      **Example of payload sent:**


      ```json

      {
        "user_name": "Alex Johnson",
        "organization": "ABC Corp",
        "job_title": "Marketing Manager"
      }

      ```
    group: 5. Reports - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
  - idn: project_attributes_setting_session_ended_webhook_schema
    value: " "
    title: Reports - Webhook - Schema [C]
    description: >-
      This setting defines a JSON schema of the payload that will be sent to

      `project_attributes_setting_session_ended_webhook_url` at the end of the
      session.


      **How it works:**


      - A predefined `template (schema)` tells the system what information to
      look for in the conversation

      - If a detail is mentioned by the user, it is captured and stored

      - If a detail is missing, the system sets it to `Not Provided` instead of
      leaving it blank

      - All collected details are sent to
      `project_attributes_setting_session_ended_webhook_url`


      **Example of schema used for data extraction:**


      ```json

      {
        "type": "object",
        "properties": {
          "user_name": {
            "type": "string",
            "description": "Set to the name provided by the user. If the user didn't mention their name, set it to "Not Provided"."
          },
          "organization": {
            "type": "string",
            "description": "Set to the organization name provided by the user. If the user didn't mention an organization name, set it to "Not Provided"."
          },
          "job_title": {
            "type": "string",
            "description": "Job title provided by the user. If the user didn't mention a job title, set it to "Not Provided"."
          }
        },
        "required": ["user_name", "organization", "job_title"]
      }

      ```


      **Example of what it captures:**


      If a user shares their company name and job title during the conversation,
      the system records:


      - Name: "Alex Johnson"

      - Organization: "ABC Corp"

      - Job Title: "Marketing Manager"


      If they don't mention part of the information, the system saves:


      - Name: "Alex Johnson"

      - Organization: "Not Provided"

      - Job Title: "Not Provided"


      **Why it is useful**


      - Sends important information for each session to the provided webhook

      - Ensures no critical information is missed.

      - Organizes data clearly for future use, easily filtered by "Not Provided"
      constant.

      - Allows you to integrate with your CRM etc
    group: 5. Reports - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.json"
  - idn: project_attributes_private_dynamic_restaurant_google_restaurant_id
    value: " "
    title: Restaurant Google Booking ID [C] [IMPORTANT]
    description: >-
      Restaurant ID in Google Booking.


      When a restaurant is connected to Google Booking, it has a unique
      identifier (ID) that the system

      uses to process reservations. This ID can be found in the booking link,
      for example:


      `https://www.google.com/maps/reserve/v/dine/c/XXXXXXXXXXX`


      Where `XXXXXXXXXXX` is the required identifier.


      This ID must be set automatically for the system to correctly send booking
      requests to Google.


      If the ID is missing or incorrect, Google Booking will not work.


      In most cases, the system automatically retrieves and sets this
      identifier. However, if reservations

      are not going through, it is worth checking whether the ID is present and
      correctly specified.
    group: 4. Agent Behavior - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.string"
