  - idn: project_attributes_setting_booking_cancellation_type
    value: default
    title: Booking - Cancellation - Type [C]
    description: >-
      This setting determines how the agent should handle a cancellation
      request.


      There are three options:


      - `default`: The system uses the standard booking cancellation method

      - `endpoint`: The system uses an external endpoint for booking
      cancellation

      - `project`: The system uses the project-specific method for booking
      cancellation


      The `default` method works in the following way: the agent will try to
      look up a

      `manage_booking_url` field among the existing user's booking and then send
      it to the user via SMS.

      Important: currently, works only for the `restaurant` industry.


      The `endpoint` method is used to send an HTTP request to a specified
      endpoint to cancel a booking.


      The `project` method is used to trigger a system event to cancel a
      booking.
