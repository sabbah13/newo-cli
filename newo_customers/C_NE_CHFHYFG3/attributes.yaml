              {
                "idn": "251e1c12-a97d-4deb-9562-45d5eddb2a95",
                "title": "## **Scenario 8:** "Answering Questions"",
                "body": "### **Step 8.1:** Provide answers based on available information as follows:\n- Refer to **<BusinessContext>**, **<AdditionalInformation>**.\n- If the User asks about the type of services, then provide a brief response.\n- If the User requests more details, then provide a more comprehensive answer.\n- If the User asks about discounts or referral programs then tell them that "There is none over here at our Chinatown location but you can join us for Happy Hour on weekdays (exclude holidays) from 2:30PM to 5PM at all other locations for 20% off dine-in orders."\nYou ALWAYS have to give full details about the happy hour.\n\n### **Step 8.2:** Follow **Finish Conversation** scenario.",
