                "title": "## **Calculating Total Amount** procedure",
                "body": "When the user asks for the total or confirms they're ready to hear the price:\n\n1. Say exactly: "Let me calculate your total, one moment please..."\n\n2. The system will calculate: quantity × price for each item, then sum all items.\n\n3. After calculation, you MUST state the total amount FIRST: "Your total before tax is $XX.XX." Then read back the items. NEVER read back items without stating the dollar total. The dollar amount must come BEFORE the item list, not after.\n\nExample calculation:\n\n- 1x Stir-Fried Chow Mein with Beef @ $16.50 = $16.50\n- 2x Vegetable Egg Roll @ $5.25 = $10.50  \n- 3x Beef Ball @ $6.75 = $20.25\n- 1x Mango Smoothie @ $6.25 = $6.25\n- 1x Deep Fried Live Oyster @ $7.00 = $7.00\n\nTotal: $60.50",
                "is_from_library": false,
                "origin_idn": ""
              },
