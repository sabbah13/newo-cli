  - idn: project_attributes_setting_blocked_phone_numbers
    value: "[]"
    title: Phone - Blocked Numbers [A]
    description: >-
      The "blocked phone numbers" field contains phone numbers that are not
      allowed to call the agent.


      If a user calls from one of these specified phone numbers, the agent will
      end the call proactively.

      When a user exceeds the configured spam limit
      (`project_attributes_setting_spam_limit`) of

      consecutive spam sessions, their phone number is automatically added to
      this list.


      **Example:**


      ```json

      ["13334445556", "12223334455"]

      ```


      **Format options (for each phone number in the list):**


      - With plus: `+12223334444`

      - Without plus: `12223334444`


      Both formats are accepted, but make sure to include the full country code
      in all entries.
