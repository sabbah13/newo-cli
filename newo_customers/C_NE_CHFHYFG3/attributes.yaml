  - idn: project_attributes_setting_data_injection_is_enabled
    value: "False"
    title: Data Injection [C]
    description: >-
      Control external data flow. Enable or disable as needed.


      Data injection lets your agent fetch data from external sources and inject
      it into a prompt on a

      regular basis.


      Your agent fetches data through POST requests. Setup is simple:


      1. Got to `Integrations`

      2. Find `webhook` connector under the API integration (look for three
      dots)

      3. Select `Webhooks`

      4. Enter URL. Save changes.


      This functionality will be extended in next versions of SuperAgent.


      See also:


      - `project_attributes_restaurant_menu_url`

      - `project_attributes_restaurant_regular_events_schedule_url`

      - `project_attributes_current_specials_url`
    group: 4. Agent Behavior - Advanced
    is_hidden: true
    possible_values: []
    value_type: !enum "AttributeValueTypes.bool"
